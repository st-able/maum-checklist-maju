<!DOCTYPE html>
<html lang="ko" class="theme-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 마음 체크리스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>if (typeof Chart !== 'undefined') Chart.defaults.animation = false;</script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { interpolate-size: allow-keywords; }

    html.theme-dark {
      --bg: #0c0c0c; --surface: #161616; --surface-hover: #1e1e1e;
      --border: rgba(255,255,255,0.08); --text: #EDEDED; --text-secondary: #888;
      --accent: #4a90ff; --accent-secondary: #2070ef; --accent-bg: rgba(74,144,255,0.12);
      --positive: #10b981; --negative: #f43f5e; --warning: #f59e0b;
      --warning-bg: rgba(245,158,11,0.1); --positive-bg: rgba(16,185,129,0.1); --negative-bg: rgba(244,63,94,0.1);
    }
    html.theme-light {
      --bg: #f7f9ff; --surface: #FFFFFF; --surface-hover: #eef3ff;
      --border: #d4dde8; --text: #0f1628; --text-secondary: #4a6278;
      --accent: #1a62e8; --accent-secondary: #0e4ec8; --accent-bg: rgba(26,98,232,0.08);
      --positive: #059669; --negative: #e11d48; --warning: #d97706;
      --warning-bg: rgba(217,119,6,0.08); --positive-bg: rgba(5,150,105,0.08); --negative-bg: rgba(225,29,72,0.08);
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.7; -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s; min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse 90% 60% at 50% 0%, color-mix(in srgb, var(--accent), transparent 90%), transparent);
    }

    h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; color: var(--text); }
    h2 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; color: var(--text); }
    h3 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
    h4 { font-size: 1.05rem; font-weight: 600; color: var(--text); }
    p { color: var(--text); }

    .skip-link {
      position: absolute; left: -9999px; top: auto; width: 1px; height: 1px;
      overflow: hidden; z-index: 10000; padding: 8px 16px;
      background: var(--accent); color: white; text-decoration: none; border-radius: 4px;
    }
    .skip-link:focus { position: fixed; left: 16px; top: 16px; width: auto; height: auto; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    /* ===== LAYOUT ===== */
    .container { max-width: 800px; margin: 0 auto; padding: 40px 24px 100px; }

    /* ===== PROGRESS ===== */
    .progress-header {
      position: sticky; top: 0; z-index: 100;
      background: color-mix(in srgb, var(--bg), transparent 8%);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px; backdrop-filter: blur(16px);
    }
    .progress-inner { max-width: 800px; margin: 0 auto; }
    .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s ease; }
    .progress-steps { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .progress-step { display: flex; align-items: center; gap: 5px; font-size: 0.77rem; color: var(--text-secondary); font-weight: 500; }
    .progress-step .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.3s; flex-shrink: 0; }
    .progress-step.active .dot { background: var(--accent); }
    .progress-step.done .dot { background: var(--positive); }
    .progress-step.active { color: var(--accent); font-weight: 600; }
    .progress-step.done { color: var(--positive); }
    .progress-sep { color: var(--border); font-size: 0.7rem; }

    /* ===== CARDS ===== */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; transition: box-shadow 0.2s ease;
    }
    .card:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.07); }

    /* ===== BUTTONS ===== */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 40px; background: var(--accent); color: white;
      font-family: inherit; font-size: 1rem; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; letter-spacing: -0.01em;
    }
    .btn-primary:hover { background: var(--accent-secondary); box-shadow: 0 4px 20px rgba(26,98,232,0.3); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; background: transparent; color: var(--text-secondary);
      font-family: inherit; font-size: 0.9rem; font-weight: 500;
      border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { background: var(--surface-hover); color: var(--text); }

    /* ===== WELCOME / PROGRAM INTRO ===== */
    .welcome-hero { text-align: center; padding: 48px 0 32px; animation: fadeInUp 0.6s ease-out both; }
    .program-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; background: var(--accent-bg);
      border: 1px solid color-mix(in srgb, var(--accent), transparent 70%);
      border-radius: 999px; font-size: 0.78rem; font-weight: 600; color: var(--accent);
      margin-bottom: 20px; letter-spacing: 0.01em;
    }
    .maeum-logo-area {
      background: linear-gradient(135deg, #f3f7ff 0%, #ddeaff 60%, #c0d4ff 100%);
      border-radius: 20px; border: 1px solid #9ab8f4;
      padding: 28px 32px; margin-bottom: 28px;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }
    html.theme-dark .maeum-logo-area {
      background: linear-gradient(135deg, #00152a 0%, #001e3a 60%, #002850 100%);
      border-color: #003a6b;
    }
    .maeum-logo-area .program-name {
      font-size: 0.82rem; font-weight: 600; color: var(--text-secondary);
      letter-spacing: 0.03em; margin-bottom: 8px;
    }
    .maeum-title {
      font-size: 3rem; font-weight: 900; color: var(--accent);
      letter-spacing: -0.04em; line-height: 1; margin-bottom: 12px;
    }
    .maeum-orgs {
      display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap;
      font-size: 0.78rem; color: var(--text-secondary);
    }
    .org-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }

    .intro-bullets { text-align: left; margin-bottom: 28px; animation: fadeInUp 0.6s ease-out 0.2s both; }
    .intro-bullet {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 20px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px;
    }
    .intro-bullet .bullet-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      flex-shrink: 0; margin-top: 8px;
    }
    .intro-bullet p { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.7; }
    .intro-bullet p strong { color: var(--text); }
    .intro-bullet .contact-num {
      display: inline-block; margin-top: 6px; font-size: 0.82rem;
      font-weight: 600; color: var(--accent);
    }

    .disclaimer {
      background: var(--warning-bg); border: 1px solid rgba(217,119,6,0.2);
      border-radius: 14px; padding: 16px 20px; margin-bottom: 28px;
      display: flex; gap: 12px; align-items: flex-start;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }
    .disclaimer .icon { flex-shrink: 0; color: var(--warning); margin-top: 2px; }
    .disclaimer p { font-size: 0.84rem; color: var(--text-secondary); line-height: 1.65; }
    .disclaimer strong { color: var(--text); }

    /* ===== CONSENT PAGE ===== */
    .consent-table {
      width: 100%; border-collapse: collapse; font-size: 0.88rem;
      margin-bottom: 20px; animation: fadeInUp 0.4s ease-out 0.1s both;
    }
    .consent-table th, .consent-table td {
      padding: 13px 16px; border: 1px solid var(--border);
      vertical-align: top; line-height: 1.65;
    }
    .consent-table th {
      background: var(--accent-bg); color: var(--accent);
      font-weight: 600; font-size: 0.82rem; text-align: left; white-space: nowrap;
      width: 38%;
    }
    .consent-table td { background: var(--surface); color: var(--text-secondary); }
    .consent-table tr:first-child th { border-radius: 12px 0 0 0; }
    .consent-table tr:last-child th { border-radius: 0 0 0 12px; }

    .consent-question {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 14px; padding: 20px 22px; text-align: center;
      animation: fadeInUp 0.4s ease-out 0.2s both;
    }
    .consent-question h4 { font-size: 1rem; margin-bottom: 16px; }
    .consent-radio-row { display: flex; gap: 12px; justify-content: center; }
    .consent-opt input[type="radio"] { display: none; }
    .consent-opt label {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 28px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 0.92rem; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .consent-opt label:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .consent-opt input[type="radio"]:checked + label.agree {
      background: var(--positive-bg); border-color: var(--positive); color: var(--positive); font-weight: 700;
    }
    .consent-opt input[type="radio"]:checked + label.disagree {
      background: var(--negative-bg); border-color: var(--negative); color: var(--negative); font-weight: 700;
    }

    .consent-footnote {
      font-size: 0.8rem; color: var(--text-secondary); line-height: 1.65;
      padding: 14px 18px; border: 1px solid var(--border);
      background: var(--surface); border-radius: 12px; margin-top: 16px;
      animation: fadeInUp 0.4s ease-out 0.3s both;
    }

    .consent-blocked {
      background: var(--negative-bg); border: 1px solid rgba(225,29,72,0.25);
      border-radius: 12px; padding: 14px 18px; margin-top: 14px;
      display: none; text-align: center;
    }
    .consent-blocked p { font-size: 0.87rem; color: var(--negative); }

    /* ===== PARTICIPANT INFO ===== */
    .info-section { margin-bottom: 24px; animation: fadeInUp 0.4s ease-out both; }
    .info-section:nth-child(1) { animation-delay: 0.05s; }
    .info-section:nth-child(2) { animation-delay: 0.1s; }
    .info-section:nth-child(3) { animation-delay: 0.15s; }
    .info-section:nth-child(4) { animation-delay: 0.2s; }
    .info-section:nth-child(5) { animation-delay: 0.25s; }
    .info-label {
      font-size: 0.88rem; font-weight: 700; color: var(--text);
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .info-label .req { color: var(--accent); font-size: 0.78rem; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .choice-btn {
      padding: 10px 20px; border: 2px solid var(--border);
      border-radius: 10px; background: var(--surface);
      font-family: inherit; font-size: 0.88rem; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .choice-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .choice-btn.selected { border-color: var(--accent); background: var(--accent); color: white; font-weight: 700; }
    .choice-btn.large { padding: 14px 28px; font-size: 0.95rem; }

    .subtype-section {
      margin-top: 14px; padding: 18px; border: 1px solid var(--border);
      background: var(--surface); border-radius: 12px; display: none;
    }
    .subtype-section.visible { display: block; }
    .subtype-label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }
    .subtype-grid { display: flex; flex-wrap: wrap; gap: 7px; }
    .subtype-btn {
      padding: 7px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; background: var(--surface-hover);
      font-family: inherit; font-size: 0.8rem; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .subtype-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .subtype-btn.selected { border-color: var(--accent); background: var(--accent); color: white; }

    /* ===== SCALE HEADER ===== */
    .scale-header { margin-bottom: 28px; padding-bottom: 22px; border-bottom: 1px solid var(--border); animation: fadeInUp 0.4s ease-out both; }
    .scale-tag {
      display: inline-block; padding: 3px 11px; background: var(--accent-bg);
      color: var(--accent); border-radius: 999px; font-size: 0.78rem; font-weight: 600;
      margin-bottom: 10px; letter-spacing: 0.02em;
    }
    .scale-header h2 { margin-bottom: 6px; font-size: 1.65rem; }
    .scale-header .desc { color: var(--text-secondary); font-size: 0.92rem; }
    .scale-header .timeframe {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
      padding: 6px 13px; background: var(--surface-hover); border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.82rem; color: var(--text-secondary); font-weight: 500;
    }

    /* ===== QUESTIONS ===== */
    .question-list { display: flex; flex-direction: column; gap: 14px; }
    .question-item {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 20px 22px;
      animation: fadeInUp 0.4s ease-out both;
      transition: border-color 0.2s;
    }
    .question-item.answered { border-color: color-mix(in srgb, var(--accent), transparent 60%); }
    .question-item:nth-child(1)  { animation-delay: 0.04s; }
    .question-item:nth-child(2)  { animation-delay: 0.07s; }
    .question-item:nth-child(3)  { animation-delay: 0.10s; }
    .question-item:nth-child(4)  { animation-delay: 0.13s; }
    .question-item:nth-child(5)  { animation-delay: 0.16s; }
    .question-item:nth-child(6)  { animation-delay: 0.19s; }
    .question-item:nth-child(7)  { animation-delay: 0.22s; }
    .question-item:nth-child(8)  { animation-delay: 0.25s; }
    .question-item:nth-child(9)  { animation-delay: 0.28s; }
    .question-item:nth-child(10) { animation-delay: 0.31s; }

    .question-num { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
    .num-badge {
      width: 24px; height: 24px; border-radius: 7px; background: var(--accent-bg);
      color: var(--accent); font-size: 0.72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
    }
    .q-text { font-size: 0.95rem; font-weight: 500; line-height: 1.55; color: var(--text); }

    /* ===== RADIO BUTTONS ===== */
    .radio-group { display: flex; flex-wrap: wrap; gap: 7px; }
    .radio-option { flex: 1; min-width: 110px; }
    .radio-option input[type="radio"] { display: none; }
    .radio-option label {
      display: block; padding: 9px 12px; text-align: center;
      background: var(--surface-hover); border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 0.79rem; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
      line-height: 1.4; user-select: none;
    }
    .radio-option label:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .radio-option input[type="radio"]:checked + label {
      background: var(--accent); border-color: var(--accent); color: white; font-weight: 600;
    }

    /* ===== NAVIGATION ===== */
    .nav-section {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 24px;
      background: color-mix(in srgb, var(--bg), transparent 8%);
      border-top: 1px solid var(--border); backdrop-filter: blur(16px); z-index: 100;
    }
    .nav-inner { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .nav-counter { font-size: 0.82rem; color: var(--text-secondary); font-weight: 500; }
    .nav-right { display: flex; gap: 10px; }
    .btn-next {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 26px; background: var(--accent); color: white;
      font-family: inherit; font-size: 0.93rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s;
    }
    .btn-next:hover:not(:disabled) { background: var(--accent-secondary); }
    .btn-next:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ===== RESULTS ===== */
    .results-hero { text-align: center; padding: 36px 0 28px; animation: fadeInUp 0.5s ease-out both; }
    .results-hero h2 { font-size: 1.9rem; margin-bottom: 6px; }
    .results-hero p { color: var(--text-secondary); font-size: 0.9rem; }

    .participant-summary {
      background: var(--accent-bg); border: 1px solid color-mix(in srgb, var(--accent), transparent 70%);
      border-radius: 14px; padding: 18px 22px; margin-bottom: 24px;
      display: flex; flex-wrap: wrap; gap: 8px 20px;
      animation: fadeInUp 0.5s ease-out 0.05s both;
    }
    .p-tag { display: flex; align-items: center; gap: 6px; font-size: 0.83rem; }
    .p-tag .p-label { color: var(--text-secondary); font-weight: 500; }
    .p-tag .p-val { color: var(--accent); font-weight: 700; }

    .scores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .score-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px; text-align: center;
      transition: box-shadow 0.2s; animation: fadeInUp 0.5s ease-out both;
    }
    .score-card:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.07); }
    .score-card:nth-child(1) { animation-delay: 0.08s; }
    .score-card:nth-child(2) { animation-delay: 0.13s; }
    .score-card:nth-child(3) { animation-delay: 0.18s; }
    .score-label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
    .score-subtitle { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 10px; }
    .score-value { font-size: 2.8rem; font-weight: 800; line-height: 1; margin-bottom: 2px; }
    .score-max { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 10px; }
    .score-level { display: inline-block; padding: 4px 13px; border-radius: 999px; font-size: 0.78rem; font-weight: 600; }
    .score-desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 8px; line-height: 1.55; }

    .level-positive { background: var(--positive-bg); color: var(--positive); }
    .level-warning   { background: var(--warning-bg);  color: var(--warning);  }
    .level-negative  { background: var(--negative-bg); color: var(--negative); }

    /* ===== CHART ===== */
    .chart-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 28px; animation: fadeInUp 0.5s ease-out 0.2s both; }
    .chart-section h3 { font-size: 1.05rem; margin-bottom: 20px; }
    .chart-container { height: 360px; position: relative; }
    .chart-risk-legend { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
    .chart-risk-legend .rl-item { display: flex; align-items: center; gap: 7px; font-size: 0.78rem; color: var(--text-secondary); }
    .chart-risk-legend .rl-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .rl-safe    { background: #059669; }
    .rl-warning { background: #d97706; }
    .rl-danger  { background: #e11d48; }
    html.theme-dark .rl-safe    { background: #10b981; }
    html.theme-dark .rl-warning { background: #f59e0b; }
    html.theme-dark .rl-danger  { background: #f43f5e; }

    /* ===== INTERPRETATION ===== */
    .interp-section { margin-bottom: 28px; animation: fadeInUp 0.5s ease-out 0.25s both; }
    .interp-section h3 { font-size: 1.15rem; margin-bottom: 16px; }
    .interp-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 10px; }
    .interp-scale { font-size: 0.76rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 5px; }
    .interp-card h4 { font-size: 1rem; margin-bottom: 7px; }
    .interp-card p { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.65; }
    .norm-note { display: block; margin-top: 10px; font-size: 0.82rem; color: var(--text-secondary); background: var(--accent-bg); padding: 8px 11px; border-radius: 8px; border-left: 3px solid var(--accent); line-height: 1.55; }

    /* ===== CRISIS ALERT ===== */
    .crisis-alert {
      background: var(--negative-bg); border: 1px solid rgba(225,29,72,0.25);
      border-radius: 14px; padding: 18px 22px; margin-bottom: 22px;
      display: flex; gap: 13px; align-items: flex-start;
    }
    .crisis-alert .icon { color: var(--negative); flex-shrink: 0; margin-top: 2px; }
    .crisis-alert h4 { color: var(--negative); margin-bottom: 5px; }
    .crisis-alert p { font-size: 0.87rem; color: var(--text-secondary); line-height: 1.65; }
    .crisis-alert a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .crisis-alert a:hover { text-decoration: underline; }

    /* ===== RECOMMENDATIONS ===== */
    .recs-section {
      background: var(--accent-bg); border: 1px solid color-mix(in srgb, var(--accent), transparent 70%);
      border-radius: 16px; padding: 26px; margin-bottom: 28px;
      animation: fadeInUp 0.5s ease-out 0.3s both;
    }
    .recs-section h3 { font-size: 1.05rem; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .rec-item { display: flex; gap: 11px; align-items: flex-start; font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.6; }
    .rec-item:last-child { margin-bottom: 0; }
    .rec-icon { color: var(--accent); flex-shrink: 0; margin-top: 2px; }

    /* ===== RESULT ACTIONS ===== */
    .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; padding-bottom: 20px; animation: fadeInUp 0.5s ease-out 0.35s both; }

    /* ===== MENU ===== */
    .viz-menu { position: fixed; top: 16px; right: 16px; z-index: 9999; }
    .viz-menu-toggle {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      backdrop-filter: blur(12px); transition: all 0.2s;
    }
    .viz-menu-toggle:hover { background: var(--surface-hover); }
    .viz-menu-dropdown {
      position: absolute; top: 52px; right: 0; min-width: 200px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px;
      opacity: 0; visibility: hidden; transform: translateY(-8px);
      transition: all 0.2s; backdrop-filter: blur(16px);
    }
    .viz-menu-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .viz-menu-dropdown button {
      width: 100%; padding: 10px 14px; border: none; border-radius: 8px;
      background: transparent; color: var(--text); font-size: 14px;
      font-family: inherit; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 10px; transition: background 0.15s;
    }
    .viz-menu-dropdown button:hover { background: var(--surface-hover); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
    .animate { animation: fadeInUp 0.6s ease-out both; }
    .reveal { opacity: 0; transform: translateY(18px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      h1 { font-size: 1.85rem; } h2 { font-size: 1.5rem; }
      .container { padding: 20px 16px 100px; }
      .radio-group { flex-direction: column; }
      .radio-option { flex: none; }
      .radio-option label { text-align: left; }
      .scores-grid { grid-template-columns: repeat(2, 1fr); }
      .maeum-title { font-size: 2.2rem; }
    }
    @media (max-width: 480px) {
      .scores-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 375px) {
      body { overflow-x: hidden; }
      h1 { font-size: 1.6rem; }
      .container { padding: 14px 12px 100px; }
      .question-item { padding: 16px 14px; }
      .consent-radio-row { flex-direction: column; align-items: center; }
    }

    @media print {
      body { background: white !important; color: black !important; }
      .viz-menu, .nav-section, .progress-header { display: none !important; }
      .container { padding: 0; }
      .score-card, .interp-card, .chart-section { break-inside: avoid; border: 1px solid #ddd; }
      * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }
    @page { margin: 1in; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .reveal { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">본문으로 이동</a>

  <!-- MENU -->
  <div class="viz-menu" role="navigation" aria-label="메뉴">

        <line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/>
      </svg>
    </button>
    <div class="viz-menu-dropdown" id="vizMenuDropdown">
      <button onclick="cycleTheme()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <span id="themeLabel">라이트 모드</span>
      </button>
      <button onclick="downloadImage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        PNG 저장
      </button>
      <button onclick="window.print()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        인쇄 / PDF
      </button>
    </div>
  </div>

  <!-- PROGRESS HEADER -->
  <div class="progress-header" id="progressHeader" style="display:none;" role="progressbar" aria-label="검사 진행 상태">
    <div class="progress-inner">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-steps" id="progressSteps"></div>
    </div>
  </div>

  <main id="main-content" role="main">
    <div class="container"><div id="stepContainer"></div></div>
  </main>

  <!-- NAVIGATION -->
  <div class="nav-section" id="navSection" style="display:none;" role="navigation" aria-label="검사 이동">
    <div class="nav-inner">
      <div class="nav-counter" id="navCounter" aria-live="polite"></div>
      <div class="nav-right">
        <button class="btn-secondary" id="btnPrev" onclick="prevStep()" style="display:none;" aria-label="이전 단계">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          이전
        </button>
        <button class="btn-next" id="btnNext" onclick="nextStep()" aria-label="다음 단계">
          다음
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    /* ================================================================
       DATA — PHQ-9, GAD-7, PSS-10
    ================================================================ */
    var PHQ9 = {
      name: 'PHQ-9', title: '우울 척도', fullName: '우울증 선별도구 (PHQ-9)',
      timeframe: '지난 2주 동안', maxScore: 27,
      options: ['전혀 없음', '며칠 동안', '7일 이상', '거의 매일'],
      values: [0, 1, 2, 3],
      questions: [
        '일 또는 여가 활동을 하는 데 흥미나 즐거움을 거의 느끼지 못함',
        '기분이 가라앉거나, 우울하거나, 희망이 없음',
        '잠들기 어렵거나 자꾸 깨거나, 반대로 너무 많이 잠',
        '피곤함을 느끼거나 기운이 거의 없음',
        '식욕이 없거나 과식함',
        '자신이 나쁜 사람이라는 느낌, 또는 실패자라는 느낌, 또는 자신이나 가족을 실망시켰다는 느낌',
        '신문을 읽거나 TV를 보는 것과 같은 일에 집중하기 어려움',
        '다른 사람들이 알아챌 정도로 너무 느리게 움직이거나 반대로 안절부절못하고 들떠 있음',
        '자신이 죽는 것이 더 낫겠다는 생각, 또는 어떤 식으로든 스스로를 해치고 싶다는 생각'
      ]
    };

    var GAD7 = {
      name: 'GAD-7', title: '불안 척도', fullName: '범불안장애 선별도구 (GAD-7)',
      timeframe: '지난 2주 동안', maxScore: 21,
      options: ['전혀 없음', '며칠 동안', '7일 이상', '거의 매일'],
      values: [0, 1, 2, 3],
      questions: [
        '불안하고 초조하거나 조마조마함',
        '걱정하는 것을 멈추거나 조절할 수 없음',
        '여러 가지 것들에 대해 너무 걱정함',
        '편안하게 쉬기가 어려움',
        '너무 안절부절못해서 가만히 앉아 있기가 힘듦',
        '쉽게 짜증이 나거나 화를 잘 내게 됨',
        '끔찍한 일이 일어날 것 같은 두려움'
      ]
    };

    var PSS = {
      name: 'PSS-10', title: '스트레스 척도', fullName: '지각된 스트레스 척도 (PSS-10)',
      timeframe: '지난 한 달 동안', maxScore: 40,
      options: ['전혀 없음', '거의 없음', '때때로', '자주', '매우 자주'],
      values: [0, 1, 2, 3, 4],
      questions: [
        {text: '예상치 못하게 일이 잘못되어서 기분이 상했습니까?', rev: false},
        {text: '삶에서 중요한 일들을 조절할 수 없다는 느낌이 들었습니까?', rev: false},
        {text: '신경이 예민해지거나 스트레스를 받는다는 느낌이 있었습니까?', rev: false},
        {text: '개인적인 문제들을 처리하는 자신의 능력에 자신감이 있었습니까?', rev: true},
        {text: '일이 뜻대로 잘 되어 간다는 느낌이 있었습니까?', rev: true},
        {text: '감당하기 힘든 일들이 너무 많이 쌓여 있다는 느낌이 들었습니까?', rev: false},
        {text: '짜증나는 일들을 잘 해결할 수 있었습니까?', rev: true},
        {text: '어떤 것들을 잘 처리하고 있다는 느낌이 들었습니까?', rev: true},
        {text: '자신이 통제할 수 없는 일들 때문에 화가 났습니까?', rev: false},
        {text: '어려움들이 너무 많아서 이를 극복할 수 없다는 느낌이 들었습니까?', rev: false}
      ]
    };

    var MBIGS = {
      name: 'MBI-GS', title: '번아웃 척도', fullName: '번아웃 척도 (MBI-GS)',
      timeframe: '평소 경험', maxScore: 6,
      options: ['전혀 없다', '거의 없다', '드물게', '가끔', '자주', '매우 자주', '항상'],
      values: [0, 1, 2, 3, 4, 5, 6],
      /* 하위척도 인덱스 */
      exhaustionIdx: [0, 1, 2, 3, 4],
      cynicismIdx:   [5, 6, 7, 8, 9],
      efficacyIdx:   [10, 11, 12, 13, 14, 15],
      questions: [
        /* ── 소진 (1-5) ── */
        '일을 하면서 감정적으로 지쳐있다고 느낀다.',
        '하루 일과를 마치면 완전히 기진맥진하다.',
        '아침에 일어나서 또 하루 일을 시작해야 한다고 생각하면 피곤함을 느낀다.',
        '하루 종일 일하는 것이 내게는 큰 부담이다.',
        '일 때문에 완전히 소진된 것 같다.',
        /* ── 냉소주의 (6-10) ── */
        '일을 시작할 때에 비해 현재는 일에 대한 관심이 줄었다.',
        '내 일이 사회에 어떤 기여를 하는지 잘 모르겠다.',
        '내가 하는 일이 의미 있는지 의구심이 든다.',
        '일에 대한 열정이 식어버렸다.',
        '나는 나의 일에 대해 냉소적이 되었다.',
        /* ── 직업 효능감 (11-16) ── */
        '나는 내 일에서 의미 있는 성과를 만들어낼 수 있다.',
        '나는 일에서 어려운 문제를 침착하게 해결할 수 있다.',
        '나는 내 일을 효과적으로 수행하고 있다고 생각한다.',
        '일을 잘 마쳤을 때 성취감을 느낀다.',
        '나는 내 일을 통해 많은 것을 이루어 왔다.',
        '나는 내 일에서 개인적으로 가치 있는 것들을 성취해 왔다.'
      ]
    };

    /* 공익활동가 세부 분류 16가지 */
    var ACTIVIST_SUBTYPES = [
      '공익법', '과거사', '노동', '문화·교육', '미디어·언론',
      '민주주의', '복지', '아동·청소년', '여성', '이주',
      '인권일반', '장애', '지역·공동체', '퀴어', '평화', '환경·기후'
    ];

    /* ================================================================
       APP STATE
    ================================================================ */
    var currentStep = 0;
    /* Step mapping:
       0 = welcome
       1 = participant info + consent (참여자 정보 & 동의)
       2 = PHQ-9
       3 = GAD-7
       4 = PSS-10
       5 = MBI-GS
       6 = results
    */
    var consentGiven = null;   /* true / false / null */
    var participantType = '';  /* 'fired' | 'activist' */
    var activistSubtype = '';
    var gender = '';
    var ageGroup = '';
    var activityPeriod = '';
    var answers = {
      phq9: new Array(9).fill(-1),
      gad7: new Array(7).fill(-1),
      pss:  new Array(10).fill(-1),
      mbi:  new Array(16).fill(-1)
    };
    var chartsBuilt = false;
    var radarChart = null;

    /* ================================================================
       GOOGLE SHEETS 연동 URL
       — Apps Script 배포 후 아래 빈 문자열을 웹 앱 URL로 교체하세요
    ================================================================ */
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxxrk91b0d_HDWysumS_DXgJ_fRGOMtCiOSauU8CKvKJabPjn78Rs0cbjQ9co4JYGht/exec';
    var dataSubmitted = false;

    /* ================================================================
       PROGRESS STEPS (shown for steps 1-6)
    ================================================================ */
    var STEPS = [
      {label: '참여자 정보'},
      {label: 'PHQ-9'},
      {label: 'GAD-7'},
      {label: 'PSS-10'},
      {label: 'MBI-GS'},
      {label: '결과'}
    ];

    function updateProgress() {
      var ph = document.getElementById('progressHeader');
      var ns = document.getElementById('navSection');
      var nc = document.getElementById('navCounter');
      var bp = document.getElementById('btnPrev');
      var bn = document.getElementById('btnNext');
      var pf = document.getElementById('progressFill');
      var ps = document.getElementById('progressSteps');

      if (currentStep === 0 || currentStep === 6) {
        ph.style.display = 'none';
        ns.style.display = 'none';
        return;
      }

      ph.style.display = '';
      ns.style.display = '';

      /* Progress bar */
      var pct = ((currentStep - 1) / (STEPS.length - 1)) * 100;
      pf.style.width = pct + '%';

      /* Step dots */
      var stepsHtml = '';
      STEPS.forEach(function(s, i) {
        var si = i + 1; /* step index */
        var cls = si < currentStep ? 'done' : si === currentStep ? 'active' : '';
        stepsHtml += '<div class="progress-step ' + cls + '"><span class="dot"></span><span>' + s.label + '</span></div>';
        if (i < STEPS.length - 1) stepsHtml += '<span class="progress-sep" aria-hidden="true">›</span>';
      });
      ps.innerHTML = stepsHtml;

      /* Nav counter */
      var counterText = '';
      if (currentStep === 2) counterText = 'PHQ-9 · 9문항';
      else if (currentStep === 3) counterText = 'GAD-7 · 7문항';
      else if (currentStep === 4) counterText = 'PSS-10 · 10문항';
      else if (currentStep === 5) counterText = 'MBI-GS · 16문항';
      nc.textContent = counterText;

      /* Prev button */
      bp.style.display = currentStep > 1 ? '' : 'none';

      /* Next button label */
      bn.textContent = '';
      if (currentStep === 5) {
        bn.innerHTML = '결과 보기 <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>';
      } else {
        bn.innerHTML = '다음 <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>';
      }

      /* Disable next based on step */
      bn.disabled = !canProceed();
    }

    function canProceed() {
      if (currentStep === 1) {
        if (!participantType || !gender || !ageGroup || !activityPeriod) return false;
        if (participantType === 'activist' && !activistSubtype) return false;
        if (consentGiven !== true) return false;
        return true;
      }
      if (currentStep === 2) return answers.phq9.every(function(v) { return v >= 0; });
      if (currentStep === 3) return answers.gad7.every(function(v) { return v >= 0; });
      if (currentStep === 4) return answers.pss.every(function(v) { return v >= 0; });
      if (currentStep === 5) return answers.mbi.every(function(v) { return v >= 0; });
      return true;
    }

    /* ================================================================
       NAVIGATION
    ================================================================ */
    function startApp() {
      currentStep = 1;
      render();
    }

    function nextStep() {
      if (!canProceed()) return;
      currentStep++;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function prevStep() {
      if (currentStep > 1) { currentStep--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }

    function resetApp() {
      currentStep = 0;
      consentGiven = null;
      participantType = ''; activistSubtype = '';
      gender = ''; ageGroup = ''; activityPeriod = '';
      answers = { phq9: new Array(9).fill(-1), gad7: new Array(7).fill(-1), pss: new Array(10).fill(-1), mbi: new Array(16).fill(-1) };
      chartsBuilt = false; radarChart = null;
      dataSubmitted = false;
      render();
    }

    /* ================================================================
       ANSWER SETTERS
    ================================================================ */
    function setAnswer(key, idx, val) {
      answers[key][idx] = val;
      var qi = document.getElementById('qi_' + key + '_' + idx);
      if (qi) qi.classList.add('answered');
      updateProgress();
    }

    function setConsent(val) {
      consentGiven = val;
      /* 버튼 선택 표시 */
      document.querySelectorAll('.choice-btn[data-field="consent"]').forEach(function(b) {
        b.classList.toggle('selected', b.dataset.val === (val === true ? 'yes' : 'no'));
      });
      var blocked = document.getElementById('consentBlocked');
      if (blocked) blocked.style.display = val === false ? 'block' : 'none';
      updateProgress();
    }

    function setParticipantType(type) {
      participantType = type;
      activistSubtype = '';
      /* 타입 버튼 시각적 선택 표시 */
      document.querySelectorAll('.choice-btn[data-field="type"]').forEach(function(b) {
        b.classList.toggle('selected', b.dataset.val === type);
      });
      var sub = document.getElementById('subtypeSection');
      if (sub) sub.classList.toggle('visible', type === 'activist');
      /* 세부 분류 선택 초기화 */
      document.querySelectorAll('.subtype-btn').forEach(function(b) { b.classList.remove('selected'); });
      updateProgress();
    }

    function setActivistSubtype(val) {
      activistSubtype = val;
      document.querySelectorAll('.subtype-btn').forEach(function(b) {
        b.classList.toggle('selected', b.dataset.val === val);
      });
      updateProgress();
    }

    function setInfo(field, val) {
      if (field === 'gender') gender = val;
      else if (field === 'age') ageGroup = val;
      else if (field === 'period') activityPeriod = val;
      /* 해당 필드 버튼 시각적 선택 표시 */
      document.querySelectorAll('.choice-btn[data-field="' + field + '"]').forEach(function(b) {
        b.classList.toggle('selected', b.dataset.val === val);
      });
      updateProgress();
    }

    /* ================================================================
       SCORING
    ================================================================ */
    function calcPHQ9() {
      return answers.phq9.reduce(function(s, v) { return s + (v < 0 ? 0 : v); }, 0);
    }
    function calcGAD7() {
      return answers.gad7.reduce(function(s, v) { return s + (v < 0 ? 0 : v); }, 0);
    }
    function calcPSS() {
      var total = 0;
      PSS.questions.forEach(function(q, i) {
        var v = answers.pss[i];
        if (v < 0) return;
        total += q.rev ? (4 - v) : v;
      });
      return total;
    }

    function calcMBI() {
      function avg(idxArr) {
        var sum = 0, cnt = 0;
        idxArr.forEach(function(i) { if (answers.mbi[i] >= 0) { sum += answers.mbi[i]; cnt++; } });
        return cnt > 0 ? sum / cnt : 0;
      }
      var exh = avg(MBIGS.exhaustionIdx);
      var cyn = avg(MBIGS.cynicismIdx);
      var eff = avg(MBIGS.efficacyIdx);
      /* 종합 번아웃 지수: 소진%+냉소% + (역산된 효능감%) 의 평균 */
      var composite = (exh / 6 * 100 + cyn / 6 * 100 + (6 - eff) / 6 * 100) / 3;
      return { exh: exh, cyn: cyn, eff: eff, composite: composite };
    }

    function getMBILevel(subscale, avg) {
      if (subscale === 'exh') {
        if (avg < 2.00) return { level: '낮음', cls: 'positive' };
        if (avg < 3.20) return { level: '보통', cls: 'warning' };
        return { level: '높음', cls: 'negative' };
      }
      if (subscale === 'cyn') {
        if (avg < 1.00) return { level: '낮음', cls: 'positive' };
        if (avg < 2.00) return { level: '보통', cls: 'warning' };
        return { level: '높음', cls: 'negative' };
      }
      /* eff: 높을수록 좋음 */
      if (avg >= 4.50) return { level: '높음', cls: 'positive' };
      if (avg >= 3.67) return { level: '보통', cls: 'warning' };
      return { level: '낮음', cls: 'negative' };
    }

    function getMBICompositeLevel(pct) {
      if (pct < 33) return { level: '낮은 번아웃', cls: 'positive' };
      if (pct < 60) return { level: '중간 번아웃', cls: 'warning' };
      return { level: '높은 번아웃', cls: 'negative' };
    }

    function getMBIProfile(exhLv, cynLv, effLv) {
      var exhHigh = exhLv.cls === 'negative';
      var cynHigh = cynLv.cls === 'negative';
      var effLow  = effLv.cls === 'negative';
      if (exhHigh && cynHigh)
        return { level: '번아웃 위험', cls: 'negative',
          desc: '소진과 냉소주의가 모두 높아 전형적인 번아웃 상태에 해당합니다. 즉각적인 회복과 전문적 지원이 필요합니다.' };
      if (exhHigh)
        return { level: '소진 주의', cls: 'warning',
          desc: '에너지 고갈이 심한 상태입니다. 번아웃으로 이어지지 않도록 충분한 휴식과 자기 돌봄이 필요합니다.' };
      if (cynHigh)
        return { level: '냉소주의 주의', cls: 'warning',
          desc: '일에 대한 의미감과 열정이 낮아진 상태입니다. 활동 동기를 회복하기 위한 지원이 필요합니다.' };
      return { level: '번아웃 징후 낮음', cls: 'positive',
        desc: '소진과 냉소주의 수준이 낮아 번아웃 징후가 거의 없는 상태입니다. 현재의 건강한 균형을 유지하세요.' };
    }

    function getLevel(scale, score) {
      var L = {
        phq9: [
          {max:4,  level:'정상',               cls:'positive', desc:'우울 증상이 거의 없는 건강한 상태입니다.'},
          {max:9,  level:'경증 우울',           cls:'warning',  desc:'가벼운 우울 증상이 있습니다.<br>생활 습관 개선이 도움이 됩니다.'},
          {max:14, level:'중등도 우울',         cls:'warning',  desc:'중간 수준의 우울 증상이 있습니다.<br>전문가 상담을 권장합니다.'},
          {max:19, level:'중등도-심각 우울',    cls:'negative', desc:'상당한 수준의 우울 증상이 있습니다.<br>전문가 도움이 필요합니다.'},
          {max:27, level:'심각한 우울',         cls:'negative', desc:'심각한 우울 증상입니다.<br>즉시 전문가의 도움을 받으세요.'}
        ],
        gad7: [
          {max:4,  level:'정상',       cls:'positive', desc:'불안 증상이 거의 없는 건강한 상태입니다.'},
          {max:9,  level:'경증 불안',   cls:'warning',  desc:'가벼운 불안 증상이 있습니다.<br>이완 기법이 도움이 됩니다.'},
          {max:14, level:'중등도 불안', cls:'warning',  desc:'중간 정도의 불안 증상이 있습니다.<br>전문가 상담을 권장합니다.'},
          {max:21, level:'심각한 불안', cls:'negative', desc:'심각한 불안 증상입니다.<br>전문가의 도움을 받으세요.'}
        ],
        pss: [
          {max:13, level:'안정',               cls:'positive', desc:'심리적으로 안정된 상태입니다.'},
          {max:16, level:'경미한 스트레스',    cls:'warning',  desc:'가벼운 수준의 스트레스가 있습니다.<br>스트레스 해소법을 찾아보세요.'},
          {max:18, level:'중간 수준 스트레스', cls:'warning',  desc:'중간 정도의 스트레스가 있습니다.<br>적극적인 관리가 필요합니다.'},
          {max:40, level:'심한 스트레스',      cls:'negative', desc:'높은 수준의 스트레스입니다.<br>전문가 상담을 권장합니다.'}
        ]
      };
      var ranges = L[scale] || [];
      for (var i = 0; i < ranges.length; i++) {
        if (score <= ranges[i].max) return ranges[i];
      }
      return ranges[ranges.length - 1] || {level:'N/A', cls:'warning', desc:''};
    }

    function renderConsent() {
      var agreeChecked  = consentGiven === true  ? ' checked' : '';
      var disagreeChecked = consentGiven === false ? ' checked' : '';
      return '<section aria-labelledby="consent-title">' +
        '<div class="scale-header">' +
        '<div class="scale-tag">개인정보 동의</div>' +
        '<h2 id="consent-title">개인정보 수집 및 이용 동의</h2>' +
        '<p class="desc">검사 결과를 마음돌봄 사업에 활용하기 위해 아래와 같이 개인정보를 수집하고 있어요. 내용을 확인하신 후 동의 여부를 선택해 주세요.</p>' +
        '</div>' +

        '<table class="consent-table" role="table" aria-label="개인정보 수집 및 이용 동의 내용">' +
        '<tbody>' +
        '<tr>' +
        '<th scope="row">수집 및 이용 목적</th>' +
        '<td>부산·양산지역 해고노동자 및 공익활동가 마음돌봄사업 \'마음자리\'의 지원과 서비스 제공을 위해 활용됩니다.</td>' +
        '</tr>' +
        '<tr>' +
        '<th scope="row">수집하는 항목</th>' +
        '<td>지정 성별, 연령대 등 체크리스트에 직접 기재하신 내용</td>' +
        '</tr>' +
        '<tr>' +
        '<th scope="row">보유 및 이용 기간</th>' +
        '<td>해당 지원과 서비스가 제공되는 기간 동안 보유합니다.</td>' +
        '</tr>' +
        '<tr>' +
        '<th scope="row">이용 근거</th>' +
        '<td>참여자 본인의 동의</td>' +
        '</tr>' +
        '<tr>' +
        '<th scope="row">동의하지 않을 경우</th>' +
        '<td>동의를 거부하실 권리가 있습니다. 다만, 동의하지 않으시면 \'마음자리\' 체크리스트 이용이 어려울 수 있습니다.</td>' +
        '</tr>' +
        '</tbody>' +
        '</table>' +

        '<div class="consent-question" role="group" aria-labelledby="consent-q">' +
        '<h4 id="consent-q">개인정보 수집 및 이용에 동의하시겠어요?</h4>' +
        '<div class="consent-radio-row">' +
        '<div class="consent-opt">' +
        '<input type="radio" id="consent_yes" name="consent" value="yes"' + agreeChecked + ' onchange="setConsent(true)">' +
        '<label for="consent_yes" class="agree">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>' +
        '동의함</label>' +
        '</div>' +
        '<div class="consent-opt">' +
        '<input type="radio" id="consent_no" name="consent" value="no"' + disagreeChecked + ' onchange="setConsent(false)">' +
        '<label for="consent_no" class="disagree">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '동의 안 함</label>' +
        '</div>' +
        '</div>' +
        '<div class="consent-blocked" id="consentBlocked" style="display:' + (consentGiven === false ? 'block' : 'none') + ';">' +
        '<p>개인정보 수집에 동의하지 않으시면 검사를 진행하실 수 없습니다. 동의하지 않으셔도 상담은 언제든지 가능합니다. <strong>📞 051-710-7125 (파랑)</strong></p>' +

        '※ (사)부산인권플랫폼 파랑은 개인정보 보호법 제15조·제22조·제23조에 따라 정보주체의 동의 절차를 성실히 준수합니다. 동의하신 개인정보는 명시된 목적 외의 용도로는 사용되거나 제3자에게 제공되지 않습니다.' +
        '</p>' +
        '</section>';
    }

    function renderParticipantInfo() {

        '<button class="choice-btn large' + (participantType === 'activist' ? ' selected' : '') + '" data-field="type" data-val="activist" onclick="setParticipantType(\'activist\')" type="button">공익활동가</button>';

      return '<section aria-labelledby="info-title">' +
        '<div class="scale-header">' +
        '<div class="scale-tag">참여자 정보</div>' +

    function renderScale(scaleData, scaleKey) {

        var optHtml = '';
        scaleData.options.forEach(function(opt, j) {
          var val = scaleData.values[j];

          optHtml += '<div class="radio-option">' +
            '<input type="radio" id="' + iid + '" name="q_' + scaleKey + '_' + i + '" value="' + val + '"' + chk +

            '<label for="' + iid + '">' + opt + '</label></div>';

          '<div class="question-num">' +
          '<div class="num-badge" aria-hidden="true">' + (i + 1) + '</div>' +

    /* ================================================================

    function phq9Desc(s) {
      if (s<=4)  return 'PHQ-9 점수 '+s+'점으로, 우울 증상이 최소 수준입니다. 현재의 건강한 생활 습관을 유지하고 정기적으로 상태를 점검하세요.';
      if (s<=9)  return 'PHQ-9 점수 '+s+'점으로, 경증 우울 증상이 있습니다. 규칙적 운동, 충분한 수면, 사회적 활동 유지가 도움이 됩니다.';
      if (s<=14) return 'PHQ-9 점수 '+s+'점으로, 중등도 우울 증상이 있습니다. 정신건강 전문가(정신건강의학과, 임상심리사)와의 상담을 적극 권장합니다.';
      if (s<=19) return 'PHQ-9 점수 '+s+'점으로, 중등도~심각한 우울 증상이 있습니다. 전문가 상담과 심리치료·약물치료를 고려하세요.';
      return 'PHQ-9 점수 '+s+'점으로, 심각한 우울 증상이 있습니다. 즉시 정신건강위기상담전화(1577-0199) 또는 정신건강의학과를 방문하시기 바랍니다.';
    }
    function gad7Desc(s) {
      if (s<=4)  return 'GAD-7 점수 '+s+'점으로, 불안 증상이 최소 수준입니다. 현재 상태를 유지하시고 스트레스 관리에 관심을 가져보세요.';
      if (s<=9)  return 'GAD-7 점수 '+s+'점으로, 경증 불안 증상이 있습니다. 심호흡, 마음챙김 명상, 이완 운동 등이 도움이 됩니다.';
      if (s<=14) return 'GAD-7 점수 '+s+'점으로, 중등도 불안 증상이 있습니다. 인지행동치료(CBT) 등 전문적인 심리치료를 고려해 보세요.';
      return 'GAD-7 점수 '+s+'점으로, 심각한 불안 증상이 있습니다. 즉각적인 전문가 평가와 치료(심리치료, 필요시 약물치료)가 권장됩니다.';
    }
    function pssDesc(s) {
      if (s<=13) return 'PSS-10 점수 '+s+'점으로, 심리적으로 안정된 상태입니다. 현재의 건강한 생활 습관을 유지하세요.';
      if (s<=16) return 'PSS-10 점수 '+s+'점으로, 경미한 수준의 스트레스가 있습니다. 운동, 산책, 명상 등 자신만의 스트레스 해소법을 찾아보는 것이 좋습니다.';
      if (s<=18) return 'PSS-10 점수 '+s+'점으로, 중간 수준의 스트레스가 있습니다. 스트레스 해소를 위한 적극적인 노력이 필요하며, 필요시 전문가의 도움을 받아보세요.';
      return 'PSS-10 점수 '+s+'점으로, 높은 수준의 스트레스를 받고 있습니다. 상담센터 방문이나 전문가와의 상담을 권장합니다.';
    }

    function mbiDesc(mbi, exhLv, cynLv, effLv) {
      var parts = [];
      if (exhLv.cls === 'negative') parts.push('소진 수준이 높아 충분한 휴식과 회복이 필요합니다');
      else if (exhLv.cls === 'warning') parts.push('소진 징후가 나타나고 있어 자기 돌봄이 필요합니다');
      if (cynLv.cls === 'negative') parts.push('일에 대한 냉소주의가 심해 활동의 의미를 되찾는 지원이 필요합니다');
      else if (cynLv.cls === 'warning') parts.push('일에 대한 관심과 열정이 줄어드는 경향이 있습니다');
      if (effLv.cls === 'negative') parts.push('직업 효능감이 낮아 자기 효능감 회복을 위한 개입이 권장됩니다');
      if (parts.length === 0) return 'MBI-GS 종합 결과, 현재 번아웃 수준이 낮고 직업 효능감이 유지되고 있습니다. 현재의 건강한 균형을 계속 유지하세요.';
      return parts.join('. ') + '.';
    }

    function buildRecs(s1, s2, s3, mbiCompPct) {
      var recs = [];
      var mbiPct = (mbiCompPct || 0) / 100;
      var maxLevel = Math.max(
        s1/27, s2/21, s3/40, mbiPct
      );
      if (maxLevel < 0.33) {
        recs.push('현재 마음건강 상태가 양호합니다. 규칙적인 수면·식사·운동 습관을 유지해 주세요.');
        recs.push('스트레스가 쌓이기 전에 취미 활동이나 사회적 교류를 통해 정서적 활력을 유지하세요.');
        recs.push('정기적으로 마음 상태를 점검하고, 변화가 있을 때는 주저하지 말고 전문가와 상담하세요.');
      } else if (maxLevel < 0.6) {
        recs.push('일상에서 자기 돌봄 시간을 확보하세요. 하루 30분 이상 걷기, 충분한 수면, 균형 잡힌 식사가 도움이 됩니다.');
        recs.push('신뢰할 수 있는 사람에게 감정을 나누거나, 일기 쓰기·명상 등으로 내면을 돌아보세요.');
        recs.push('마음자리 심리상담에 참여해 보세요. 상담은 당신이 겪고 있는 어려움을 안전하게 다루는 공간입니다.');
        recs.push('위기 시 언제든 정신건강위기상담전화(1577-0199, 24시간)에 연락하세요.');
      } else {
        recs.push('현재 높은 수준의 심리적 어려움이 감지됩니다. 혼자 감당하려 하지 마시고 반드시 전문적 지원을 받으세요.');
        recs.push('마음자리 심리상담 참여를 강력히 권장합니다. 전화: 051-710-7125 (파랑)');
        recs.push('정신건강위기상담전화 1577-0199 (24시간) 또는 자살예방상담전화 1393 (24시간)을 이용하세요.');
        recs.push('가능하다면 주변의 신뢰하는 사람에게 현재 상태를 알리고 함께 도움을 받을 방법을 찾아보세요.');
      }
      return recs;
    }

    /* ================================================================
       MAIN RENDER
    ================================================================ */
    function render() {
      var container = document.getElementById('stepContainer');
      var html = '';
      if (currentStep === 0) html = renderWelcome();
      else if (currentStep === 1) html = renderParticipantInfo();
      else if (currentStep === 2) html = renderScale(PHQ9, 'phq9');
      else if (currentStep === 3) html = renderScale(GAD7, 'gad7');
      else if (currentStep === 4) html = renderScale(PSS, 'pss');
      else if (currentStep === 5) html = renderMBIScale();
      else if (currentStep === 6) html = renderResults();
      container.innerHTML = html;
      updateProgress();
      if (currentStep === 6) {
        setTimeout(buildRadarChart, 80);
        setTimeout(submitResults, 300);
      }
    }

    /* ================================================================
       RADAR CHART
    ================================================================ */
    function buildRadarChart() {
      if (typeof Chart === 'undefined') return;
      var canvas = document.getElementById('radarChart');
      if (!canvas) return;
      if (radarChart) { try { radarChart.destroy(); } catch(e) {} }

      var isDark = document.documentElement.classList.contains('theme-dark');
      var textColor = isDark ? '#EDEDED' : '#0f1628';
      var gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(15,22,40,0.08)';
      var accentColor = isDark ? '#4a90ff' : '#1a62e8';

      var s1 = calcPHQ9(), s2 = calcGAD7(), s3 = calcPSS();
      var p1 = Math.round(s1/27*100), p2 = Math.round(s2/21*100), p3 = Math.round(s3/40*100);
      var mbi = calcMBI();
      var p4 = Math.round(mbi.exh / 6 * 100); /* 소진% — MBI 핵심 지표 */

      function getPointColor(pct) {
        if (pct <= 50) return isDark ? '#10b981' : '#059669';
        if (pct <= 75) return isDark ? '#f59e0b' : '#d97706';
        return isDark ? '#f43f5e' : '#e11d48';
      }

      radarChart = new Chart(canvas, {
        type: 'radar',
        data: {
          labels: ['우울 (PHQ-9)', '불안 (GAD-7)', '스트레스 (PSS-10)', '번아웃 (MBI-GS)'],
          datasets: [{
            label: '현재 점수 (%)',
            data: [p1, p2, p3, p4],
            backgroundColor: isDark ? 'rgba(74,144,255,0.15)' : 'rgba(26,98,232,0.12)',
            borderColor: accentColor,
            borderWidth: 2,
            pointBackgroundColor: [getPointColor(p1), getPointColor(p2), getPointColor(p3), getPointColor(p4)],
            pointRadius: 6,
            pointHoverRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              enabled: true,
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                label: function(ctx) {
                  return ctx.dataset.label + ': ' + ctx.parsed.r + '%';
                }
              }
            }
          },
          scales: {
            r: {
              min: 0, max: 100,
              ticks: {
                stepSize: 25,
                color: textColor,
                font: { family: 'Noto Sans KR', size: 11 },
                backdropColor: 'transparent',
                callback: function(v) { return v + '%'; }
              },
              grid: { color: gridColor },
              angleLines: { color: gridColor },
              pointLabels: {
                color: textColor,
                font: { family: 'Noto Sans KR', size: 13, weight: '600' }
              }
            }
          }
        }
      });
      chartsBuilt = true;
    }

    /* ================================================================
       GOOGLE SHEETS 데이터 전송
    ================================================================ */
    function submitResults() {
      if (!GAS_URL || dataSubmitted) return;

      var s1 = calcPHQ9(), s2 = calcGAD7(), s3 = calcPSS();
      var l1 = getLevel('phq9', s1), l2 = getLevel('gad7', s2), l3 = getLevel('pss', s3);

      var mbi = calcMBI();
      var mbiCompLv = getMBICompositeLevel(mbi.composite);
      var payload = {
        timestamp: new Date().toISOString(),
        participantType: participantType === 'fired' ? '해고노동자' : '공익활동가',
        activistSubtype: activistSubtype || '',
        gender: gender,
        ageGroup: ageGroup,
        activityPeriod: activityPeriod,
        phq9Score: s1,
        phq9Level: l1.level,
        gad7Score: s2,
        gad7Level: l2.level,
        pssScore: s3,
        pssLevel: l3.level,
        mbiExhAvg: mbi.exh.toFixed(2),
        mbiExhLevel: getMBILevel('exh', mbi.exh).level,
        mbiCynAvg: mbi.cyn.toFixed(2),
        mbiCynLevel: getMBILevel('cyn', mbi.cyn).level,
        mbiEffAvg: mbi.eff.toFixed(2),
        mbiEffLevel: getMBILevel('eff', mbi.eff).level
      };

      var statusEl = document.getElementById('submitStatus');
      if (statusEl) statusEl.innerHTML = '데이터 저장 중...';

      fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      }).then(function() {
        dataSubmitted = true;
        if (statusEl) {
          statusEl.innerHTML =
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:5px"><polyline points="20 6 9 17 4 12"/></svg>데이터가 저장되었습니다.';
          statusEl.style.color = 'var(--positive)';
        }
      }).catch(function() {
        if (statusEl) {
          statusEl.innerHTML = '저장 중 오류가 발생했습니다. 관리자에게 문의해 주세요.';
          statusEl.style.color = 'var(--negative)';
        }
      });
    }

    function onThemeChange() {
      if (currentStep === 6) {
        chartsBuilt = false;
        setTimeout(buildRadarChart, 100);
      }
    }

    /* ================================================================
       MENU & THEME
    ================================================================ */
    function toggleMenu() {
      var dropdown = document.getElementById('vizMenuDropdown');
      if (dropdown) dropdown.classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.viz-menu')) {
        var dropdown = document.getElementById('vizMenuDropdown');
        if (dropdown) dropdown.classList.remove('open');
      }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var dropdown = document.getElementById('vizMenuDropdown');
        if (dropdown) dropdown.classList.remove('open');
      }
    });

    /* Theme */
    var savedTheme = localStorage.getItem('viz-theme');
    var currentTheme = savedTheme || 'light';
    function applyTheme(t) {
      document.documentElement.className = 'theme-' + t;
      var lbl = document.getElementById('themeLabel');
      if (lbl) lbl.textContent = t === 'dark' ? '라이트 모드' : '다크 모드';
      localStorage.setItem('viz-theme', t);
      currentTheme = t;
      if (typeof onThemeChange === 'function') onThemeChange();
    }
    function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    applyTheme(currentTheme);

    /* Download PNG */
    function downloadImage() {
      var menu = document.querySelector('.viz-menu');
      menu.style.display = 'none';
      try {
        htmlToImage.toPng(document.body, { quality: 1, pixelRatio: 2 }).then(function(url) {
          var a = document.createElement('a'); a.href = url;
          a.download = '내마음체크리스트-결과.png'; a.click();
          menu.style.display = '';
        }).catch(function(e) { console.error(e); menu.style.display = ''; });
      } catch(e) { console.error(e); menu.style.display = ''; }
    }

    /* ================================================================
       SCROLL REVEAL
    ================================================================ */
    document.querySelectorAll('[data-reveal]').forEach(function(el) { el.classList.add('reveal'); });
    var revealObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); revealObserver.unobserve(e.target); } });
    }, { threshold: 0.15 });
    document.querySelectorAll('.reveal').forEach(function(el) { revealObserver.observe(el); });

    /* ================================================================
       INIT
    ================================================================ */
    render();
  </script>
</body>
