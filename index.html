<!DOCTYPE html>
<html lang="ko" class="theme-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음건강 자가진단 · 심리 척도 검사</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>if (typeof Chart !== 'undefined') Chart.defaults.animation = false;</script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { interpolate-size: allow-keywords; }

    html.theme-dark {
      --bg: #0c0c0c; --surface: #161616; --surface-hover: #1e1e1e;
      --border: rgba(255,255,255,0.08); --text: #EDEDED; --text-secondary: #888;
      --accent: #14b8a6; --accent-secondary: #0d9488; --accent-bg: rgba(20,184,166,0.12);
      --positive: #10b981; --negative: #f43f5e; --warning: #f59e0b;
      --warning-bg: rgba(245,158,11,0.1); --positive-bg: rgba(16,185,129,0.1); --negative-bg: rgba(244,63,94,0.1);
    }
    html.theme-light {
      --bg: #f0fdfa; --surface: #FFFFFF; --surface-hover: #f0fdfb;
      --border: #e2e8f0; --text: #0f172a; --text-secondary: #64748b;
      --accent: #0d9488; --accent-secondary: #0f766e; --accent-bg: rgba(13,148,136,0.08);
      --positive: #059669; --negative: #e11d48; --warning: #d97706;
      --warning-bg: rgba(217,119,6,0.08); --positive-bg: rgba(5,150,105,0.08); --negative-bg: rgba(225,29,72,0.08);
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.7; -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s; min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse 90% 60% at 50% 0%, color-mix(in srgb, var(--accent), transparent 88%), transparent);
    }

    h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; color: var(--text); }
    h2 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; color: var(--text); }
    h3 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
    h4 { font-size: 1.05rem; font-weight: 600; color: var(--text); }
    p { color: var(--text); }

    .skip-link {
      position: absolute; left: -9999px; top: auto; width: 1px; height: 1px;
      overflow: hidden; z-index: 10000; padding: 8px 16px;
      background: var(--accent); color: white; text-decoration: none; border-radius: 4px;
    }
    .skip-link:focus { position: fixed; left: 16px; top: 16px; width: auto; height: auto; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    /* ===== LAYOUT ===== */
    .container { max-width: 800px; margin: 0 auto; padding: 40px 24px 100px; }

    /* ===== PROGRESS ===== */
    .progress-header {
      position: sticky; top: 0; z-index: 100;
      background: color-mix(in srgb, var(--bg), transparent 8%);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px; backdrop-filter: blur(16px);
    }
    .progress-inner { max-width: 800px; margin: 0 auto; }
    .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s ease; }
    .progress-steps { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .progress-step { display: flex; align-items: center; gap: 5px; font-size: 0.77rem; color: var(--text-secondary); font-weight: 500; }
    .progress-step .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.3s; flex-shrink: 0; }
    .progress-step.active .dot { background: var(--accent); }
    .progress-step.done .dot { background: var(--positive); }
    .progress-step.active { color: var(--accent); font-weight: 600; }
    .progress-step.done { color: var(--positive); }
    .progress-sep { color: var(--border); font-size: 0.7rem; }

    /* ===== CARDS ===== */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; transition: box-shadow 0.2s ease;
    }
    .card:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.07); }

    /* ===== BUTTONS ===== */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 40px; background: var(--accent); color: white;
      font-family: inherit; font-size: 1rem; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; letter-spacing: -0.01em;
    }
    .btn-primary:hover { background: var(--accent-secondary); box-shadow: 0 4px 20px rgba(13,148,136,0.3); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; background: transparent; color: var(--text-secondary);
      font-family: inherit; font-size: 0.9rem; font-weight: 500;
      border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { background: var(--surface-hover); color: var(--text); }

    /* ===== WELCOME ===== */
    .welcome-hero { text-align: center; padding: 56px 0 36px; animation: fadeInUp 0.6s ease-out both; }
    .welcome-hero .icon-wrap {
      width: 76px; height: 76px; border-radius: 22px; background: var(--accent-bg);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 22px;
    }
    .welcome-hero .subtitle { font-size: 1.05rem; color: var(--text-secondary); max-width: 480px; margin: 8px auto 36px; }

    .scale-overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
    .scale-chip {
      display: flex; align-items: center; gap: 12px; padding: 16px 18px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    }
    .scale-chip:nth-child(1) { animation: fadeInUp 0.6s ease-out 0.1s both; }
    .scale-chip:nth-child(2) { animation: fadeInUp 0.6s ease-out 0.2s both; }
    .scale-chip:nth-child(3) { animation: fadeInUp 0.6s ease-out 0.3s both; }
    .scale-chip .sc-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .scale-chip h4 { font-size: 0.88rem; margin-bottom: 2px; }
    .scale-chip p { font-size: 0.78rem; color: var(--text-secondary); }

    .disclaimer {
      background: var(--warning-bg); border: 1px solid rgba(217,119,6,0.2);
      border-radius: 14px; padding: 18px 22px; margin-bottom: 30px;
      display: flex; gap: 12px; align-items: flex-start;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }
    .disclaimer .icon { flex-shrink: 0; color: var(--warning); margin-top: 2px; }
    .disclaimer p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.65; }
    .disclaimer strong { color: var(--text); }

    /* ===== OCCUPATION ===== */
    .occupation-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 28px; }
    .occupation-card {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 16px; padding: 26px 22px; cursor: pointer; transition: all 0.2s;
      text-align: left; font-family: inherit; width: 100%;
    }
    .occupation-card:nth-child(1) { animation: fadeInUp 0.5s ease-out 0.05s both; }
    .occupation-card:nth-child(2) { animation: fadeInUp 0.5s ease-out 0.1s both; }
    .occupation-card:nth-child(3) { animation: fadeInUp 0.5s ease-out 0.15s both; }
    .occupation-card:nth-child(4) { animation: fadeInUp 0.5s ease-out 0.2s both; }
    .occupation-card:hover { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-bg); }
    .occupation-card.selected { border-color: var(--accent); background: var(--accent-bg); }
    .occupation-card .occ-icon {
      width: 48px; height: 48px; border-radius: 13px; background: var(--accent-bg);
      display: flex; align-items: center; justify-content: center; margin-bottom: 14px;
    }
    .occupation-card h3 { font-size: 1rem; margin-bottom: 6px; }
    .occupation-card p { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.55; }
    .occupation-card .scale-badge {
      display: inline-block; margin-top: 12px; padding: 4px 10px;
      background: var(--accent-bg); color: var(--accent);
      border-radius: 999px; font-size: 0.73rem; font-weight: 600;
    }

    /* ===== SCALE HEADER ===== */
    .scale-header { margin-bottom: 28px; padding-bottom: 22px; border-bottom: 1px solid var(--border); animation: fadeInUp 0.4s ease-out both; }
    .scale-tag {
      display: inline-block; padding: 3px 11px; background: var(--accent-bg);
      color: var(--accent); border-radius: 999px; font-size: 0.78rem; font-weight: 600;
      margin-bottom: 10px; letter-spacing: 0.02em;
    }
    .scale-header h2 { margin-bottom: 6px; font-size: 1.65rem; }
    .scale-header .desc { color: var(--text-secondary); font-size: 0.92rem; }
    .scale-header .timeframe {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
      padding: 6px 13px; background: var(--surface-hover); border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.82rem; color: var(--text-secondary); font-weight: 500;
    }

    /* ===== QUESTIONS ===== */
    .question-list { display: flex; flex-direction: column; gap: 14px; }
    .question-item {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 20px 22px;
      animation: fadeInUp 0.4s ease-out both;
      transition: border-color 0.2s;
    }
    .question-item.answered { border-color: color-mix(in srgb, var(--accent), transparent 60%); }
    .question-item:nth-child(1)  { animation-delay: 0.04s; }
    .question-item:nth-child(2)  { animation-delay: 0.07s; }
    .question-item:nth-child(3)  { animation-delay: 0.10s; }
    .question-item:nth-child(4)  { animation-delay: 0.13s; }
    .question-item:nth-child(5)  { animation-delay: 0.16s; }
    .question-item:nth-child(6)  { animation-delay: 0.19s; }
    .question-item:nth-child(7)  { animation-delay: 0.22s; }
    .question-item:nth-child(8)  { animation-delay: 0.25s; }
    .question-item:nth-child(9)  { animation-delay: 0.28s; }
    .question-item:nth-child(10) { animation-delay: 0.31s; }

    .question-num { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
    .num-badge {
      width: 24px; height: 24px; border-radius: 7px; background: var(--accent-bg);
      color: var(--accent); font-size: 0.72rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
    }
    .q-text { font-size: 0.95rem; font-weight: 500; line-height: 1.55; color: var(--text); }

    /* ===== RADIO BUTTONS ===== */
    .radio-group { display: flex; flex-wrap: wrap; gap: 7px; }
    .radio-option { flex: 1; min-width: 110px; }
    .radio-option input[type="radio"] { display: none; }
    .radio-option label {
      display: block; padding: 9px 12px; text-align: center;
      background: var(--surface-hover); border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 0.79rem; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
      line-height: 1.4; user-select: none;
    }
    .radio-option label:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .radio-option input[type="radio"]:checked + label {
      background: var(--accent); border-color: var(--accent); color: white; font-weight: 600;
    }

    /* ===== NAVIGATION ===== */
    .nav-section {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 24px;
      background: color-mix(in srgb, var(--bg), transparent 8%);
      border-top: 1px solid var(--border); backdrop-filter: blur(16px); z-index: 100;
    }
    .nav-inner { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .nav-counter { font-size: 0.82rem; color: var(--text-secondary); font-weight: 500; }
    .nav-right { display: flex; gap: 10px; }
    .btn-next {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 26px; background: var(--accent); color: white;
      font-family: inherit; font-size: 0.93rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s;
    }
    .btn-next:hover:not(:disabled) { background: var(--accent-secondary); }
    .btn-next:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ===== RESULTS ===== */
    .results-hero { text-align: center; padding: 36px 0 28px; animation: fadeInUp 0.5s ease-out both; }
    .results-hero h2 { font-size: 1.9rem; margin-bottom: 6px; }
    .results-hero p { color: var(--text-secondary); font-size: 0.9rem; }

    .scores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .score-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px; text-align: center;
      transition: box-shadow 0.2s; animation: fadeInUp 0.5s ease-out both;
    }
    .score-card:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.07); }
    .score-card:nth-child(1) { animation-delay: 0.05s; }
    .score-card:nth-child(2) { animation-delay: 0.10s; }
    .score-card:nth-child(3) { animation-delay: 0.15s; }
    .score-card:nth-child(4) { animation-delay: 0.20s; }
    .score-label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
    .score-subtitle { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 10px; }
    .score-value { font-size: 2.8rem; font-weight: 800; line-height: 1; margin-bottom: 2px; }
    .score-max { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 10px; }
    .score-level { display: inline-block; padding: 4px 13px; border-radius: 999px; font-size: 0.78rem; font-weight: 600; }
    .score-desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 8px; line-height: 1.55; }

    .level-positive { background: var(--positive-bg); color: var(--positive); }
    .level-warning   { background: var(--warning-bg);  color: var(--warning);  }
    .level-negative  { background: var(--negative-bg); color: var(--negative); }

    /* ===== CHART ===== */
    .chart-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 28px; animation: fadeInUp 0.5s ease-out 0.2s both; }
    .chart-section h3 { font-size: 1.05rem; margin-bottom: 20px; }
    .chart-container { height: 360px; position: relative; }
    .chart-risk-legend { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
    .chart-risk-legend .rl-item { display: flex; align-items: center; gap: 7px; font-size: 0.78rem; color: var(--text-secondary); }
    .chart-risk-legend .rl-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .rl-safe    { background: #0d9488; }
    .rl-warning { background: #d97706; }
    .rl-danger  { background: #e11d48; }
    html.theme-dark .rl-safe    { background: #14b8a6; }
    html.theme-dark .rl-warning { background: #f59e0b; }
    html.theme-dark .rl-danger  { background: #f43f5e; }

    /* ===== INTERPRETATION ===== */
    .interp-section { margin-bottom: 28px; animation: fadeInUp 0.5s ease-out 0.25s both; }
    .interp-section h3 { font-size: 1.15rem; margin-bottom: 16px; }
    .interp-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 10px; }
    .interp-scale { font-size: 0.76rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 5px; }
    .interp-card h4 { font-size: 1rem; margin-bottom: 7px; }
    .interp-card p { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.65; }
    .norm-note { display: block; margin-top: 10px; font-size: 0.82rem; color: var(--text-secondary); background: var(--accent-bg); padding: 8px 11px; border-radius: 8px; border-left: 3px solid var(--accent); line-height: 1.55; }

    /* ===== CRISIS ALERT ===== */
    .crisis-alert {
      background: var(--negative-bg); border: 1px solid rgba(225,29,72,0.25);
      border-radius: 14px; padding: 18px 22px; margin-bottom: 22px;
      display: flex; gap: 13px; align-items: flex-start;
    }
    .crisis-alert .icon { color: var(--negative); flex-shrink: 0; margin-top: 2px; }
    .crisis-alert h4 { color: var(--negative); margin-bottom: 5px; }
    .crisis-alert p { font-size: 0.87rem; color: var(--text-secondary); line-height: 1.65; }
    .crisis-alert a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .crisis-alert a:hover { text-decoration: underline; }

    /* ===== RECOMMENDATIONS ===== */
    .recs-section {
      background: var(--accent-bg); border: 1px solid color-mix(in srgb, var(--accent), transparent 70%);
      border-radius: 16px; padding: 26px; margin-bottom: 28px;
      animation: fadeInUp 0.5s ease-out 0.3s both;
    }
    .recs-section h3 { font-size: 1.05rem; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .rec-item { display: flex; gap: 11px; align-items: flex-start; font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.6; }
    .rec-item:last-child { margin-bottom: 0; }
    .rec-icon { color: var(--accent); flex-shrink: 0; margin-top: 2px; }

    /* ===== RESULT ACTIONS ===== */
    .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; padding-bottom: 20px; animation: fadeInUp 0.5s ease-out 0.35s both; }

    /* ===== MENU ===== */
    .viz-menu { position: fixed; top: 16px; right: 16px; z-index: 9999; }
    .viz-menu-toggle {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      backdrop-filter: blur(12px); transition: all 0.2s;
    }
    .viz-menu-toggle:hover { background: var(--surface-hover); }
    .viz-menu-dropdown {
      position: absolute; top: 52px; right: 0; min-width: 200px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px;
      opacity: 0; visibility: hidden; transform: translateY(-8px);
      transition: all 0.2s; backdrop-filter: blur(16px);
    }
    .viz-menu-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .viz-menu-dropdown button {
      width: 100%; padding: 10px 14px; border: none; border-radius: 8px;
      background: transparent; color: var(--text); font-size: 14px;
      font-family: inherit; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 10px; transition: background 0.15s;
    }
    .viz-menu-dropdown button:hover { background: var(--surface-hover); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
    .animate { animation: fadeInUp 0.6s ease-out both; }
    .animate.delay-1 { animation-delay: 0.1s; }
    .animate.delay-2 { animation-delay: 0.2s; }
    .animate.delay-3 { animation-delay: 0.3s; }
    .reveal { opacity: 0; transform: translateY(18px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      h1 { font-size: 1.85rem; } h2 { font-size: 1.5rem; }
      .container { padding: 20px 16px 100px; }
      .scale-overview { grid-template-columns: 1fr; }
      .occupation-grid { grid-template-columns: 1fr; }
      .radio-group { flex-direction: column; }
      .radio-option { flex: none; }
      .radio-option label { text-align: left; }
      .scores-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .scale-overview { grid-template-columns: 1fr; }
      .scores-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 375px) {
      body { overflow-x: hidden; }
      h1 { font-size: 1.6rem; }
      .container { padding: 14px 12px 100px; }
      .question-item { padding: 16px 14px; }
    }

    @media print {
      body { background: white !important; color: black !important; }
      .viz-menu, .nav-section, .progress-header { display: none !important; }
      .container { padding: 0; }
      .score-card, .interp-card, .chart-section { break-inside: avoid; border: 1px solid #ddd; }
      * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }
    @page { margin: 1in; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .reveal { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

  <!-- PROGRESS HEADER -->
  <div class="progress-header" id="progressHeader" style="display:none;" role="progressbar" aria-label="검사 진행 상태">

      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-steps" id="progressSteps"></div>
    </div>
  </div>

  <main id="main-content" role="main">
    <div class="container"><div id="stepContainer"></div></div>
  </main>

  <!-- NAVIGATION -->
  <div class="nav-section" id="navSection" style="display:none;" role="navigation" aria-label="검사 이동">
    <div class="nav-inner">
      <div class="nav-counter" id="navCounter" aria-live="polite"></div>
      <div class="nav-right">
        <button class="btn-secondary" id="btnPrev" onclick="prevStep()" style="display:none;" aria-label="이전 단계">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          이전
        </button>
        <button class="btn-next" id="btnNext" onclick="nextStep()" aria-label="다음 단계">
          다음
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    /* ================================================================
       QUESTIONNAIRE DATA
    ================================================================ */
    var PHQ9 = {
      name: 'PHQ-9', title: '우울 척도', fullName: '우울증 선별도구 (PHQ-9)',
      timeframe: '지난 2주 동안', maxScore: 27,
      options: ['전혀 없음', '며칠 동안', '7일 이상', '거의 매일'],
      values: [0, 1, 2, 3],
      questions: [
        '일 또는 여가 활동을 하는 데 흥미나 즐거움을 거의 느끼지 못함',
        '기분이 가라앉거나, 우울하거나, 희망이 없음',
        '잠들기 어렵거나 자꾸 깨거나, 반대로 너무 많이 잠',
        '피곤함을 느끼거나 기운이 거의 없음',
        '식욕이 없거나 과식함',
        '자신이 나쁜 사람이라는 느낌, 또는 실패자라는 느낌, 또는 자신이나 가족을 실망시켰다는 느낌',
        '신문을 읽거나 TV를 보는 것과 같은 일에 집중하기 어려움',
        '다른 사람들이 알아챌 정도로 너무 느리게 움직이거나 반대로 안절부절못하고 들떠 있음',
        '자신이 죽는 것이 더 낫겠다는 생각, 또는 어떤 식으로든 스스로를 해치고 싶다는 생각'
      ]
    };

    var GAD7 = {
      name: 'GAD-7', title: '불안 척도', fullName: '범불안장애 선별도구 (GAD-7)',
      timeframe: '지난 2주 동안', maxScore: 21,
      options: ['전혀 없음', '며칠 동안', '7일 이상', '거의 매일'],
      values: [0, 1, 2, 3],
      questions: [
        '불안하고 초조하거나 조마조마함',
        '걱정하는 것을 멈추거나 조절할 수 없음',
        '여러 가지 것들에 대해 너무 걱정함',
        '편안하게 쉬기가 어려움',
        '너무 안절부절못해서 가만히 앉아 있기가 힘듦',
        '쉽게 짜증이 나거나 화를 잘 내게 됨',
        '끔찍한 일이 일어날 것 같은 두려움'
      ]
    };

    var PSS = {
      name: 'PSS-10', title: '스트레스 척도', fullName: '지각된 스트레스 척도 (PSS-10)',
      timeframe: '지난 한 달 동안', maxScore: 40,
      options: ['전혀 없음', '거의 없음', '때때로', '자주', '매우 자주'],
      values: [0, 1, 2, 3, 4],
      questions: [
        {text: '예상치 못하게 일이 잘못되어서 기분이 상했습니까?', rev: false},
        {text: '삶에서 중요한 일들을 조절할 수 없다는 느낌이 들었습니까?', rev: false},
        {text: '신경이 예민해지거나 스트레스를 받는다는 느낌이 있었습니까?', rev: false},
        {text: '개인적인 문제들을 처리하는 자신의 능력에 자신감이 있었습니까?', rev: true},
        {text: '일이 뜻대로 잘 되어 간다는 느낌이 있었습니까?', rev: true},
        {text: '감당하기 힘든 일들이 너무 많이 쌓여 있다는 느낌이 들었습니까?', rev: false},
        {text: '짜증나는 일들을 잘 해결할 수 있었습니까?', rev: true},
        {text: '어떤 것들을 잘 처리하고 있다는 느낌이 들었습니까?', rev: true},
        {text: '자신이 통제할 수 없는 일들 때문에 화가 났습니까?', rev: false},
        {text: '어려움들이 너무 많아서 이를 극복할 수 없다는 느낌이 들었습니까?', rev: false}
      ]
    };

    var EMOTIONAL_LABOR = {
      name: 'ELS', title: '감정노동 척도', fullName: '감정노동 척도 (ELS)',
      timeframe: '최근 한 달 동안', maxScore: 28,
      options: ['전혀 그렇지 않다', '그렇지 않다', '보통이다', '그렇다', '매우 그렇다'],
      values: [0, 1, 2, 3, 4],
      questions: [
        '고객(환자·이용자·학생 등)을 응대할 때 실제로 느끼지 않는 감정을 표현해야 한다',
        '직장에서 내가 느끼는 감정과 다른 감정을 표현해야 할 때가 자주 있다',
        '응대 중 부정적인 감정을 드러내지 않기 위해 많은 노력이 필요하다',
        '고객 응대 후에 감정적으로 지치거나 소진되는 느낌이 든다',
        '직장에서의 감정 규칙(표현해야 하는 감정)과 내 실제 감정 사이에 갈등이 있다',
        '원하지 않아도 웃음이나 친절한 태도를 억지로 유지해야 한다',
        '업무로 인한 감정 소모가 개인 생활에도 영향을 미친다'
      ]
    };

    var TRAUMA = {
      name: 'PCL-5', title: '외상 스트레스 척도', fullName: 'PTSD 증상 체크리스트 (PCL-5)',
      timeframe: '지난 한 달 동안', maxScore: 40,
      options: ['전혀 없음', '가끔', '보통', '자주', '매우 자주'],
      values: [0, 1, 2, 3, 4],
      questions: [
        '외상적 사건(사고, 폭력, 재난 등)과 관련된 기억이나 생각이 반복적으로 떠오름',
        '외상 경험을 마치 실제로 다시 겪는 것처럼 느끼거나 행동함(플래시백)',
        '외상 경험과 관련된 것을 떠올리게 하는 물건, 상황, 활동 등을 피하려 함',
        '외상 경험에 대한 부정적인 생각이나 감정을 피하려 함',
        '과거에 즐겼던 활동에 대한 관심이 사라지거나 다른 사람과 멀어진 느낌',
        '감정이 마비된 것 같거나 긍정적인 감정을 느끼기 어려움',
        '항상 경계하거나 잠재적 위험을 주시하게 됨',
        '사소한 자극에도 깜짝 놀라거나 과도하게 반응함',
        '잠들기 어렵거나 자주 깨어남',
        '집중하기 어렵거나 일상 업무에 지장이 생김'
      ]
    };

    var BURNOUT = {
      name: 'MBI', title: '소진(번아웃) 척도', fullName: '직무 소진 척도 (MBI)',
      timeframe: '최근 한 달 동안', maxScore: 36,
      options: ['전혀 그렇지 않다', '그렇지 않다', '보통이다', '그렇다', '매우 그렇다'],
      values: [0, 1, 2, 3, 4],
      questions: [
        '업무로 인해 정서적으로 완전히 지쳐 있다고 느낀다',
        '하루 일과를 마쳤을 때 완전히 소진된 느낌이다',
        '직무를 처음 시작했을 때보다 지금이 훨씬 지쳐 있다고 느낀다',
        '환자·이용자·고객에 대해 냉담하거나 무감각한 태도를 취하고 있다',
        '업무 대상(환자·이용자 등)을 인격적으로 대하지 못하는 것 같다',
        '이 직업으로 인해 감정적으로 무감각해진 것 같다',
        '현재의 업무에서 가치 있는 일을 성취하고 있다는 느낌이 없다',
        '현재 하는 일에서 성취감이나 보람을 느끼지 못한다',
        '이 직업이 나에게 맞지 않는다고 느낀다'
      ]
    };

    /* ================================================================
       APP STATE
    ================================================================ */
    var currentStep = 0;
    var occupation = '';
    var extraScale = null;
    var answers = {
      phq9: new Array(9).fill(-1),
      gad7: new Array(7).fill(-1),
      pss:  new Array(10).fill(-1),
      extra: null
    };
    var chartsBuilt = false;
    var radarChart = null;

    /* Step index → name mapping */
    function getCurrentStepName() {
      var names = ['welcome', 'occupation', 'phq9', 'gad7', 'pss', 'extra', 'results'];
      return names[currentStep] || 'welcome';
    }

    /* ================================================================
       SCORING
    ================================================================ */
    function calcPHQ9() {
      return answers.phq9.reduce(function(s, v) { return s + (v < 0 ? 0 : v); }, 0);
    }
    function calcGAD7() {
      return answers.gad7.reduce(function(s, v) { return s + (v < 0 ? 0 : v); }, 0);
    }
    function calcPSS() {
      var total = 0;
      PSS.questions.forEach(function(q, i) {
        var v = answers.pss[i];
        if (v < 0) return;
        total += q.rev ? (4 - v) : v;
      });
      return total;
    }
    function calcExtra() {
      if (!answers.extra) return 0;
      return answers.extra.reduce(function(s, v) { return s + (v < 0 ? 0 : v); }, 0);
    }

    function getExtraScaleData() {
      if (extraScale === 'emotionallabor') return EMOTIONAL_LABOR;
      if (extraScale === 'trauma')         return TRAUMA;
      if (extraScale === 'burnout')        return BURNOUT;
      return null;
    }

    function getLevel(scale, score) {
      var L = {
        phq9: [
          {max:4,  level:'정상',           cls:'positive', desc:'우울 증상이 거의 없는 건강한 상태입니다.'},
          {max:9,  level:'경증 우울',       cls:'warning',  desc:'가벼운 우울 증상이 있습니다.<br>생활 습관 개선이 도움이 됩니다.'},
          {max:14, level:'중등도 우울',     cls:'warning',  desc:'중간 수준의 우울 증상이 있습니다.<br>전문가 상담을 권장합니다.'},
          {max:19, level:'중등도-심각 우울',cls:'negative', desc:'상당한 수준의 우울 증상이 있습니다.<br>전문가 도움이 필요합니다.'},
          {max:27, level:'심각한 우울',     cls:'negative', desc:'심각한 우울 증상입니다.<br>즉시 전문가의 도움을 받으세요.'}
        ],
        gad7: [
          {max:4,  level:'정상',       cls:'positive', desc:'불안 증상이 거의 없는 건강한 상태입니다.'},
          {max:9,  level:'경증 불안',   cls:'warning',  desc:'가벼운 불안 증상이 있습니다.<br>이완 기법이 도움이 됩니다.'},
          {max:14, level:'중등도 불안', cls:'warning',  desc:'중간 정도의 불안 증상이 있습니다.<br>전문가 상담을 권장합니다.'},
          {max:21, level:'심각한 불안', cls:'negative', desc:'심각한 불안 증상입니다.<br>전문가의 도움을 받으세요.'}
        ],
        pss: [
          {max:13, level:'정상',              cls:'positive', desc:'심리적으로 안정된 상태입니다.'},
          {max:16, level:'경미한 스트레스',   cls:'warning',  desc:'가벼운 수준의 스트레스가 있습니다.<br>스트레스 해소법을 찾아보세요.'},
          {max:18, level:'중간 수준 스트레스',cls:'warning',  desc:'중간 정도의 스트레스가 있습니다.<br>적극적인 관리가 필요합니다.'},
          {max:40, level:'심한 스트레스',     cls:'negative', desc:'높은 수준의 스트레스입니다.<br>전문가 상담을 권장합니다.'}
        ],
        emotionallabor: [
          {max:7,  level:'낮음',     cls:'positive', desc:'감정노동 부담이 낮은 수준입니다.'},
          {max:14, level:'보통 수준', cls:'warning',  desc:'보통 수준의 감정노동 부담이 있습니다.'},
          {max:21, level:'높음',     cls:'negative', desc:'감정노동 부담이 높습니다.<br>자기 돌봄이 중요합니다.'},
          {max:28, level:'매우 높음', cls:'negative', desc:'감정노동 부담이 매우 높습니다.<br>전문적 지원이 필요합니다.'}
        ],
        trauma: [
          {max:8,  level:'정상범위',    cls:'positive', desc:'외상 스트레스 증상이 정상 범위 내에 있습니다.'},
          {max:15, level:'경미한 증상', cls:'warning',  desc:'경미한 외상 스트레스 증상이 있습니다.'},
          {max:25, level:'중등도 증상', cls:'negative', desc:'중등도의 외상 스트레스 증상이 있습니다.<br>전문가 상담을 권장합니다.'},
          {max:40, level:'심각한 증상', cls:'negative', desc:'심각한 외상 스트레스 증상입니다.<br>즉시 전문가 도움을 받으세요.'}
        ],
        burnout: [
          {max:9,  level:'낮은 소진',  cls:'positive', desc:'소진(번아웃) 수준이 낮습니다.'},
          {max:18, level:'보통 수준',  cls:'warning',  desc:'보통 수준의 소진이 있습니다.'},
          {max:27, level:'높은 소진',  cls:'negative', desc:'소진 수준이 높습니다.<br>업무 환경 개선이 필요합니다.'},
          {max:36, level:'심각한 소진',cls:'negative', desc:'심각한 소진 상태입니다.<br>즉각적인 회복 지원이 필요합니다.'}
        ]
      };
      var ranges = L[scale] || [];
      for (var i = 0; i < ranges.length; i++) {
        if (score <= ranges[i].max) return ranges[i];
      }
      return ranges[ranges.length - 1] || {level:'N/A', cls:'warning', desc:''};
    }

    /* ================================================================
       RENDER HELPERS
    ================================================================ */
    function makeScoreCard(scaleName, title, score, max, level) {
      var col = level.cls === 'positive' ? 'var(--positive)' : level.cls === 'warning' ? 'var(--warning)' : 'var(--negative)';
      return '<div class="score-card">' +
        '<div class="score-label">' + title + '</div>' +
        '<div class="score-subtitle">' + scaleName + '</div>' +
        '<div class="score-value" style="color:' + col + '">' + score + '</div>' +
        '<div class="score-max">/ ' + max + '점</div>' +
        '<span class="score-level level-' + level.cls + '">' + level.level + '</span>' +
        '<p class="score-desc">' + level.desc + '</p>' +
        '</div>';
    }

    function makeInterpCard(fullName, level, score, max, detail) {
      return '<div class="interp-card">' +
        '<div class="interp-scale">' + fullName + '</div>' +
        '<h4>' + level.level + ' <span style="color:var(--text-secondary);font-weight:400;font-size:0.88rem">(' + score + ' / ' + max + '점)</span></h4>' +
        '<p>' + detail + '</p>' +
        '</div>';
    }

    /* ================================================================
       STEP RENDERERS
    ================================================================ */
    function renderWelcome() {
      return '<section class="welcome-hero" aria-labelledby="welcome-title">' +
        '<div class="icon-wrap" aria-hidden="true">' +

        '</div>' +

    function renderScale(scaleData, scaleKey) {
      var qHtml = '';
      scaleData.questions.forEach(function(q, i) {
        var qText = typeof q === 'object' ? q.text : q;
        var curr = (scaleKey === 'extra' ? (answers.extra || []) : answers[scaleKey])[i];
        if (curr === undefined) curr = -1;
        var optHtml = '';
        scaleData.options.forEach(function(opt, j) {
          var val = scaleData.values[j];
          var chk = curr === val ? ' checked' : '';
          var iid = 'q_' + scaleKey + '_' + i + '_' + j;
          optHtml += '<div class="radio-option">' +
            '<input type="radio" id="' + iid + '" name="q_' + scaleKey + '_' + i + '" value="' + val + '"' + chk +
            ' onchange="setAnswer(\'' + scaleKey + '\',' + i + ',' + val + ')">' +
            '<label for="' + iid + '">' + opt + '</label></div>';
        });
        var ans = curr !== -1 ? ' answered' : '';
        qHtml += '<div class="question-item' + ans + '" id="qi_' + scaleKey + '_' + i + '" role="listitem">' +
          '<div class="question-num">' +
          '<div class="num-badge" aria-hidden="true">' + (i + 1) + '</div>' +
          '<p class="q-text">' + qText + '</p></div>' +
          '<div class="radio-group" role="group" aria-label="' + (i + 1) + '번 항목 응답">' + optHtml + '</div>' +
          '</div>';
      });

      return '<section aria-labelledby="scale_title_' + scaleKey + '">' +
        '<div class="scale-header">' +
        '<div class="scale-tag">' + scaleData.name + '</div>' +
        '<h2 id="scale_title_' + scaleKey + '">' + scaleData.title + '</h2>' +
        '<p class="desc">' + scaleData.fullName + '</p>' +
        '<div class="timeframe">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
        scaleData.timeframe + '을 기준으로 해당하는 정도를 선택해 주세요' +
        '</div></div>' +
        '<div class="question-list" role="list">' + qHtml + '</div></section>';
    }

    function renderResults() {
      var s1 = calcPHQ9(), s2 = calcGAD7(), s3 = calcPSS();
      var l1 = getLevel('phq9', s1), l2 = getLevel('gad7', s2), l3 = getLevel('pss', s3);

      /* Crisis alert for PHQ-9 item 9 */
      var crisisHtml = '';
      if (answers.phq9[8] > 0) {
        crisisHtml = '<div class="crisis-alert" role="alert" aria-live="assertive">' +
          '<div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>' +

      }

      /* Score cards */
      var scoreCardsHtml = makeScoreCard('PHQ-9', '우울', s1, 27, l1) +
        makeScoreCard('GAD-7', '불안', s2, 21, l2) +
        makeScoreCard('PSS-10', '스트레스', s3, 40, l3);

      var s4 = null, l4 = null;

      /* Interpretations */
      var interpHtml = makeInterpCard('우울 척도 (PHQ-9)', l1, s1, 27, phq9Desc(s1)) +

      /* Recommendations */

      }).join('');

      return crisisHtml +

        '<p>아래 결과는 참고용 정보입니다. 정확한 진단은 전문가와 상담하세요.</p></section>' +

        '<section aria-label="척도별 점수">' +

        '<section class="chart-section" aria-label="종합 결과 차트">' +

          '<div class="rl-item"><span class="rl-dot rl-safe"></span>50% 이하</div>' +
          '<div class="rl-item"><span class="rl-dot rl-warning"></span>50% 초과</div>' +
          '<div class="rl-item"><span class="rl-dot rl-danger"></span>75% 초과</div>' +
        '</div></section>' +

        '<section class="interp-section" aria-label="척도별 상세 해석">' +
        '<h3>척도별 상세 해석</h3>' + interpHtml + '</section>' +

        '<div>' + recsHtml + '</div></div>' +

    function phq9Desc(s) {
      if (s<=4)  return 'PHQ-9 점수 '+s+'점으로, 우울 증상이 최소 수준입니다. 현재의 건강한 생활 습관을 유지하고 정기적으로 상태를 점검하세요.';
      if (s<=9)  return 'PHQ-9 점수 '+s+'점으로, 경증 우울 증상이 있습니다. 규칙적 운동, 충분한 수면, 사회적 활동 유지가 도움이 됩니다.';
      if (s<=14) return 'PHQ-9 점수 '+s+'점으로, 중등도 우울 증상이 있습니다. 정신건강 전문가(정신건강의학과, 임상심리사)와의 상담을 적극 권장합니다.';
      if (s<=19) return 'PHQ-9 점수 '+s+'점으로, 중등도~심각한 우울 증상이 있습니다. 전문가 상담과 심리치료·약물치료를 고려하세요.';
      return 'PHQ-9 점수 '+s+'점으로, 심각한 우울 증상이 있습니다. 즉시 정신건강위기상담전화(1577-0199) 또는 정신건강의학과를 방문하시기 바랍니다.';
    }
    function gad7Desc(s) {
      if (s<=4)  return 'GAD-7 점수 '+s+'점으로, 불안 증상이 최소 수준입니다. 현재 상태를 유지하시고 스트레스 관리에 관심을 가져보세요.';
      if (s<=9)  return 'GAD-7 점수 '+s+'점으로, 경증 불안 증상이 있습니다. 심호흡, 마음챙김 명상, 이완 운동 등이 도움이 됩니다.';
      if (s<=14) return 'GAD-7 점수 '+s+'점으로, 중등도 불안 증상이 있습니다. 인지행동치료(CBT) 등 전문적인 심리치료를 고려해 보세요.';
      return 'GAD-7 점수 '+s+'점으로, 심각한 불안 증상이 있습니다. 즉각적인 전문가 평가와 치료(심리치료, 필요시 약물치료)가 권장됩니다.';
    }
    function pssDesc(s) {
      if (s<=13) return 'PSS-10 점수 '+s+'점으로, 심리적으로 안정된 상태입니다. 현재의 건강한 생활 습관을 유지하세요.';
      if (s<=16) return 'PSS-10 점수 '+s+'점으로, 경미한 수준의 스트레스가 있습니다. 운동, 산책, 명상 등 자신만의 스트레스 해소법을 찾아보는 것이 좋습니다.';
      if (s<=18) return 'PSS-10 점수 '+s+'점으로, 중간 수준의 스트레스가 있습니다. 스트레스 해소를 위한 적극적인 노력이 필요하며, 필요시 전문가의 도움을 받아보세요.';
      return 'PSS-10 점수 '+s+'점으로, 높은 수준의 스트레스를 받고 있습니다. 상담센터 방문이나 전문가와의 상담을 권장합니다.';
    }

    /* PSS-10 직군 규준 비교 코멘트
       참고 평균 출처:
         일반 성인 — Lee et al.(2012) 한국판 PSS 타당도 연구 및 복수 지역사회 표본
         감정노동·의료 — 국내 종사자 PSS 연구 (평균 20.6~21점 수준)
         소방·경찰 — 국내 위기대응 직군 직무스트레스 연구
       * 연구마다 표본·시기 차이가 있어 참고용 수치임을 안내                     */
    function pssNormComment(score, occType) {
      var norms = {
        'general':        { mean: 18, group: '한국 일반 성인' },
        'emotionallabor': { mean: 21, group: '국내 감정노동 종사자' },
        'frontline':      { mean: 20, group: '국내 소방·경찰 등 위기대응 직군' },
        'healthcare':     { mean: 21, group: '국내 의료·간호 종사자' }
      };
      var ref = norms[occType] || norms['general'];
      var diff = score - ref.mean;
      var compText;
      if      (diff <= -5) compText = '평균보다 <strong>낮은</strong> 수준';
      else if (diff <   3) compText = '평균과 <strong>비슷한</strong> 수준';
      else                 compText = '평균보다 <strong>높은</strong> 수준';
      return '<span class="norm-note">📊 직군 비교: ' + ref.group + ' PSS-10 평균(약 ' + ref.mean + '점) 대비 ' + compText + '입니다. (국내외 연구 기반 참고치)</span>';
    }
    function extraDesc(scale, s) {
      if (scale === 'emotionallabor') {
        if (s<=7)  return '감정노동 척도 '+s+'점으로, 감정노동 부담이 낮습니다.';
        if (s<=14) return '감정노동 척도 '+s+'점으로, 보통 수준의 부담이 있습니다. 퇴근 후 감정 분리 기술과 취미 활동이 도움이 됩니다.';
        if (s<=21) return '감정노동 척도 '+s+'점으로, 감정노동 부담이 높습니다. 업무 중 미니 휴식, 감정 일기 작성, 동료 지지 활용을 권장합니다.';
        return '감정노동 척도 '+s+'점으로, 부담이 매우 높습니다. 직장 내 EAP 프로그램 및 전문가 상담을 즉시 이용해 보시기 바랍니다.';
      }
      if (scale === 'trauma') {
        if (s<=8)  return 'PCL-5 점수 '+s+'점으로, 외상 스트레스 증상이 정상 범위입니다.';
        if (s<=15) return 'PCL-5 점수 '+s+'점으로, 경미한 외상 스트레스 증상이 있습니다. 동료 지지, 충분한 휴식, 규칙적 운동이 회복에 도움이 됩니다.';
        if (s<=25) return 'PCL-5 점수 '+s+'점으로, 중등도 외상 스트레스 증상이 있습니다. PTSD 전문 치료(EMDR, PE치료 등)를 위한 전문가 상담을 강력히 권장합니다.';
        return 'PCL-5 점수 '+s+'점으로, 심각한 외상 스트레스 증상이 있습니다. 즉각적인 전문 정신건강 치료가 필요합니다.';
      }
      if (scale === 'burnout') {
        if (s<=9)  return '소진 척도 '+s+'점으로, 소진 수준이 낮습니다.';
        if (s<=18) return '소진 척도 '+s+'점으로, 보통 수준의 직무 소진이 있습니다. 업무·생활 균형, 동료와의 소통, 작은 성취 인정하기가 도움이 됩니다.';
        if (s<=27) return '소진 척도 '+s+'점으로, 소진 수준이 높습니다. 업무 환경 개선, 슈퍼비전 참여, 전문가 상담을 적극 활용하세요.';
        return '소진 척도 '+s+'점으로, 심각한 소진 상태입니다. 즉각적인 회복 지원과 전문가 상담이 필요합니다.';
      }
      return '';
    }

    function buildRecs(s1, s2, s3, s4) {
      var recs = [];
      var highConcern = s1 >= 15 || s2 >= 15 || s3 >= 19;
      var modConcern  = s1 >= 10 || s2 >= 10 || s3 >= 14;

      if (highConcern) {
        recs.push('여러 영역에서 높은 수준의 증상이 확인되었습니다. 정신건강의학과나 심리상담센터를 빠른 시일 내에 방문하시길 강력히 권장합니다.');
      } else if (modConcern) {
        recs.push('일부 영역에서 주의가 필요한 수준의 증상이 있습니다. 지역 정신건강복지센터나 상담기관을 통해 전문가 도움을 구해보세요.');
      } else {
        recs.push('현재 마음 상태가 비교적 건강합니다. 현재의 건강한 생활 습관을 유지하고 정기적으로 자신의 상태를 점검하세요.');
      }

      if (s3 >= 14) {
        recs.push('규칙적인 운동(주 3~5회, 30분 이상 유산소 운동)은 스트레스 호르몬을 줄이고 기분을 향상시키는 데 매우 효과적입니다.');
      }
      if (s1 >= 5 || s2 >= 5) {
        recs.push('충분한 수면(매일 같은 시간에 취침·기상, 7~8시간)을 확보하고 취침 전 스마트폰 사용을 줄이세요.');
      }
      if (extraScale === 'emotionallabor') {
        recs.push('퇴근 후 "감정 전환" 루틴(산책, 음악 감상, 일기 쓰기 등)을 만들어 감정노동 소진을 예방하세요.');
        recs.push('직장 내 근로자 지원 프로그램(EAP)이나 노동자 심리상담 서비스를 적극 활용하세요.');
      }
      if (extraScale === 'trauma') {
        recs.push('동료 지지(peer support) 프로그램과 기관 내 심리지원 서비스(소방청·경찰청 등 직무 스트레스 프로그램)를 확인해 보세요.');
      }
      if (extraScale === 'burnout') {
        recs.push('슈퍼비전과 동료 상담을 통해 업무 부담을 공유하고, 의료기관 내 직원 지원 프로그램(EAP)을 활용해 보세요.');
      }
      recs.push('마음챙김(mindfulness) 명상이나 호흡 이완 운동을 꾸준히 실천하면 불안과 스트레스 완화에 도움이 됩니다.');
      recs.push('<strong>위기 상담전화:</strong> 정신건강위기상담전화 <strong>1577-0199</strong> · 자살예방상담전화 <strong>1393</strong> (모두 24시간 무료)');
      return recs;
    }

    /* ================================================================
       NAVIGATION & STATE
    ================================================================ */
    function startApp() {
      currentStep = 1; render();
    }

    function selectOccupation(type) {
      occupation = type;
      extraScale = null; answers.extra = null;
      if (type === 'emotionallabor') { extraScale = 'emotionallabor'; answers.extra = new Array(7).fill(-1); }
      if (type === 'frontline')      { extraScale = 'trauma';         answers.extra = new Array(10).fill(-1); }
      if (type === 'healthcare')     { extraScale = 'burnout';        answers.extra = new Array(9).fill(-1); }
      render();
      setTimeout(nextStep, 400);
    }

    function nextStep() {
      currentStep++;
      if (getCurrentStepName() === 'extra' && !extraScale) currentStep++;
      render();
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function prevStep() {
      currentStep--;
      if (getCurrentStepName() === 'extra' && !extraScale) currentStep--;
      render();
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function setAnswer(scale, index, value) {
      if (scale === 'extra') {
        if (answers.extra) answers.extra[index] = value;
      } else {
        answers[scale][index] = value;
      }
      var item = document.getElementById('qi_' + scale + '_' + index);
      if (item) item.classList.add('answered');
      updateNav();
    }

    function isStepComplete() {
      var step = getCurrentStepName();
      if (step === 'phq9') return answers.phq9.every(function(v) { return v >= 0; });
      if (step === 'gad7') return answers.gad7.every(function(v) { return v >= 0; });
      if (step === 'pss')  return answers.pss.every(function(v) { return v >= 0; });
      if (step === 'extra') return answers.extra && answers.extra.every(function(v) { return v >= 0; });
      return true;
    }

    function resetApp() {
      currentStep = 0; occupation = ''; extraScale = null;
      answers = { phq9: new Array(9).fill(-1), gad7: new Array(7).fill(-1), pss: new Array(10).fill(-1), extra: null };
      chartsBuilt = false; radarChart = null;
      render();
    }

    /* ================================================================
       MAIN RENDER
    ================================================================ */
    function render() {
      var step = getCurrentStepName();
      var container  = document.getElementById('stepContainer');
      var progHeader = document.getElementById('progressHeader');
      var navSection = document.getElementById('navSection');

      if (step === 'welcome') {
        container.innerHTML = renderWelcome();
        progHeader.style.display = 'none';
        navSection.style.display = 'none';
        return;
      }

      progHeader.style.display = 'block';
      navSection.style.display = 'block';

      if (step === 'occupation') {
        container.innerHTML = renderOccupation();
      } else if (step === 'phq9') {
        container.innerHTML = renderScale(PHQ9, 'phq9');
      } else if (step === 'gad7') {
        container.innerHTML = renderScale(GAD7, 'gad7');
      } else if (step === 'pss') {
        container.innerHTML = renderScale(PSS, 'pss');
      } else if (step === 'extra') {
        container.innerHTML = renderScale(getExtraScaleData(), 'extra');
      } else if (step === 'results') {
        container.innerHTML = renderResults();
        navSection.style.display = 'none';
        chartsBuilt = false;
        setTimeout(buildRadarChart, 250);
        return;
      }

      updateProgress();
      updateNav();
    }

    function updateProgress() {
      var step = getCurrentStepName();
      var stepNames = extraScale
        ? ['직업군', 'PHQ-9', 'GAD-7', 'PSS', '직업 척도', '결과']
        : ['직업군', 'PHQ-9', 'GAD-7', 'PSS', '결과'];
      var stepKeys = extraScale
        ? ['occupation', 'phq9', 'gad7', 'pss', 'extra', 'results']
        : ['occupation', 'phq9', 'gad7', 'pss', 'results'];

      var idx = stepKeys.indexOf(step);
      var pct = idx < 0 ? 0 : (idx / (stepKeys.length - 1) * 100);

      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressSteps').innerHTML = stepKeys.map(function(key, i) {
        var cls = 'progress-step' + (i < idx ? ' done' : i === idx ? ' active' : '');
        return '<div class="' + cls + '"><div class="dot"></div><span>' + stepNames[i] + '</span></div>';
      }).join('<span class="progress-sep" aria-hidden="true">›</span>');
    }

    function updateNav() {
      var step = getCurrentStepName();
      var btnPrev = document.getElementById('btnPrev');
      var btnNext = document.getElementById('btnNext');
      var navCounter = document.getElementById('navCounter');
      if (!btnPrev || !btnNext) return;

      btnPrev.style.display = currentStep > 1 ? 'inline-flex' : 'none';

      if (step === 'occupation') {
        btnNext.style.display = 'none';
        navCounter.textContent = '직업군을 선택하면 자동으로 다음 단계로 이동합니다';
        return;
      }

      btnNext.style.display = 'inline-flex';
      btnNext.disabled = !isStepComplete();

      var arr = step === 'extra' ? (answers.extra || []) : (answers[step] || []);
      var done = arr.filter(function(v) { return v >= 0; }).length;
      navCounter.textContent = arr.length > 0 ? done + ' / ' + arr.length + '개 항목 응답 완료' : '';
    }

    /* ================================================================
       CHART
    ================================================================ */
    function buildRadarChart() {
      if (chartsBuilt || typeof Chart === 'undefined') return;
      var canvas = document.getElementById('radarChart');
      if (!canvas) return;

      var s1 = calcPHQ9(), s2 = calcGAD7(), s3 = calcPSS();
      var labels = ['우울 (PHQ-9)', '불안 (GAD-7)', '스트레스 (PSS)'];
      var data   = [Math.round(s1/27*100), Math.round(s2/21*100), Math.round(s3/40*100)];

      if (extraScale) {
        var ed = getExtraScaleData();
        var s4 = calcExtra();
        labels.push(ed.title.replace(' 척도','') + ' (' + ed.name + ')');
        data.push(Math.round(s4 / ed.maxScore * 100));
      }

      var dark = document.documentElement.classList.contains('theme-dark');
      var textCol   = dark ? '#EDEDED' : '#0f172a';
      var textSec   = dark ? '#888'    : '#64748b';
      var gridCol   = dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
      var surfaceBg = dark ? '#161616' : '#ffffff';

      /* ── 위험도별 색상 팔레트 ── */
      var COL = {
        safe:    { solid: dark ? '#14b8a6' : '#0d9488', fill: 'rgba(13,148,136,0.15)' },
        warning: { solid: dark ? '#f59e0b' : '#d97706', fill: 'rgba(245,158,11,0.15)' },
        danger:  { solid: dark ? '#f43f5e' : '#e11d48', fill: 'rgba(244,63,94,0.15)'  }
      };

      function riskLevel(v) {
        if (v > 75) return 'danger';
        if (v > 50) return 'warning';
        return 'safe';
      }

      /* 포인트별 색상 배열 */
      var pointColors  = data.map(function(v) { return COL[riskLevel(v)].solid; });
      /* 전체 선·면 색상 = 가장 높은 위험도 기준 */
      var maxRisk = data.reduce(function(acc, v) {
        var r = riskLevel(v);
        if (r === 'danger')  return 'danger';
        if (r === 'warning' && acc !== 'danger') return 'warning';
        return acc;
      }, 'safe');
      var lineCol = COL[maxRisk].solid;
      var fillCol = COL[maxRisk].fill;

      if (radarChart) { try { radarChart.destroy(); } catch(e) {} }

      radarChart = new Chart(canvas, {
        type: 'radar',
        data: {
          labels: labels,
          datasets: [{
            label: '점수 (최대 100점 기준)',
            data: data,
            backgroundColor: fillCol,
            borderColor: lineCol,
            borderWidth: 2.5,
            pointBackgroundColor: pointColors,
            pointBorderColor: surfaceBg,
            pointBorderWidth: 2,
            pointRadius: 7,
            pointHoverRadius: 10
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: { padding: 16 },
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: textCol, font: { family: "'Noto Sans KR', sans-serif", size: 13 }, padding: 18 }
            },
            tooltip: {
              enabled: true, padding: 12, cornerRadius: 8,
              titleFont: { family: "'Noto Sans KR', sans-serif", size: 14 },
              bodyFont:  { family: "'Noto Sans KR', sans-serif", size: 13 },
              callbacks: {
                label: function(ctx) {
                  return '  ' + ctx.parsed.r + '점 / 100점 기준';
                }
              }
            }
          },
          scales: {
            r: {
              min: 0, max: 100,
              ticks: {
                stepSize: 25, color: textSec,
                font: { family: "'Noto Sans KR', sans-serif", size: 11 },
                backdropColor: 'transparent',
                callback: function(v) { return v + '%'; }
              },
              grid: { color: gridCol },
              pointLabels: { color: textCol, font: { family: "'Noto Sans KR', sans-serif", size: 12, weight: '600' } },
              angleLines: { color: gridCol }
            }
          }
        }
      });
      chartsBuilt = true;
    }

    function onThemeChange() {
      if (chartsBuilt && getCurrentStepName() === 'results') {
        chartsBuilt = false;
        setTimeout(buildRadarChart, 100);
      }
    }

    /* ================================================================
       THEME & MENU
    ================================================================ */
    function toggleMenu() {
      var d = document.getElementById('vizMenuDropdown');
      if (d) d.classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.viz-menu')) {
        var d = document.getElementById('vizMenuDropdown');
        if (d) d.classList.remove('open');
      }
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var d = document.getElementById('vizMenuDropdown');
        if (d) d.classList.remove('open');
      }
    });

    var currentTheme = localStorage.getItem('viz-theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

    function applyTheme(t) {
      document.documentElement.className = 'theme-' + t;
      var lbl = document.getElementById('themeLabel');
      if (lbl) lbl.textContent = t === 'dark' ? '라이트 모드' : '다크 모드';
      localStorage.setItem('viz-theme', t);
      currentTheme = t;
      if (typeof onThemeChange === 'function') onThemeChange();
    }
    function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    applyTheme(currentTheme);

    async function downloadImage() {
      var menu = document.querySelector('.viz-menu');
      menu.style.display = 'none';
      try {
        var url = await htmlToImage.toPng(document.body, { quality: 1, pixelRatio: 2 });
        var a = document.createElement('a');
        a.href = url; a.download = '마음건강자가진단-결과.png'; a.click();
      } catch(e) { console.error(e); }
      menu.style.display = '';
    }

    /* ================================================================
       SCROLL REVEAL
    ================================================================ */
    document.querySelectorAll('[data-reveal]').forEach(function(el) { el.classList.add('reveal'); });
    var revObs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); revObs.unobserve(e.target); } });
    }, { threshold: 0.15 });
    document.querySelectorAll('.reveal').forEach(function(el) { revObs.observe(el); });

    /* ================================================================
       INIT
    ================================================================ */
    render();
  </script>
</body>
</html>
